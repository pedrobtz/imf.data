        Database","names":{"en":"GDELT Database"},"description":"ABOUT THIS DATA SERVICE\nGDELT
        monitors print, broadcast, and web news media from across every country in
        the world with real-time measurement of tones and 60k themes to keep continually
        updated on breaking developments anywhere on the planet. Its historical archives
        stretch back to January 1, 1979 and update every 15 minutes. The data provides
        multilingual support across 65 different languages, all of which are translated
        in real-time into English. Through its ability to leverage the world’s collective
        news media, GDELT moves beyond the focus of the Western media towards a far
        more global perspective on what’s happening and how the world is feeling about
        it. (The GDELT Project, n.d.).\nGDELT includes two databases: ”GKG (Global
        Knowledge Graph)” and ”Events”, plus an API that gets you a list of articles
        with selected keywords. Both databases have two modes: one that includes only
        ”English” written articles and a ”combined database” that includes English
        and non-English articles. The description for both databases:\n\nTable 1:
        Description of GDELT Datasets\n\nCategory\tGKG (Global Knowledge Graph)\tEvents\nDescription\tA
        database of global news coverage that includes entities, themes, and emotions
        extracted from news articles.\tA record of events reported in the news, including
        various attributes related to the events.\nVariables\t\nEntities (people,
        organizations, locations)\nThemes (topics of discussion)\nEmotion scores (positive,
        negative, and neutral)\nSource information (media outlets)\nDate and time
        of capture\nEvent type (e.g., protests, elections)\nLocation (geographical
        coordinates)\nParticipants (who is involved)\nDate and time of occurrence\nContextual
        information (background details)\nBoth of the databases could be useful for
        different teams within the IMF. For example, if we were interested in an Energy
        Subsidy Reform analysis:\n\nIn the GKG database, every article is tagged with
        different themes (topics of discussion). Out of the 60k themes, using python
        scripts and machine learning techniques, 77 themes were tagged as “relevant”
        for the ESR analysis. If we would select the topic “WB 1627 ENERGY SUBSIDIES”
        for the entirety of the database in English at the IMF (from January 20​15
        to October 2024), then we get more than 6M articles. Even if we can’t get
        the full text of the articles (as per compliance reasons) and, hence, do our
        own sentiment analysis, we could use these 6M articles to: identify stakeholders
        (people, organizations, entities) that are more mentioned in the context of
        energy subsidy reforms, we could see in which countries these reforms have
        more media impact and/or to see the frequency of this topic being mentioned,
        we could analyze the general emotion (tone) and see the polarity between the
        different media sources (right-left, public-private, etc.), identify which
        countries speak more about other countries in the context of energy subsidy
        reforms, etc.\nIn the Events database, for conducting sentiment analysis on
        energy subsidy reforms, we could focus on specific event categories that reflect
        public and institutional responses. Key events include public statements and
        sentiments (CAMEO Category 1), particularly optimistic or pessimistic comments,
        policy considerations, and expressions of accord or disapproval. Policy-related
        appeals (Category 2), such as demands for policy changes or easing of economic
        sanctions, offer insights into public or stakeholder pressures. Additionally,
        expressions of intent to cooperate or reform (Category 3) indicate the willingness
        to engage in economic or policy adjustments. Protests and demonstrations (Category
        14), especially those advocating for or against policy changes, highlight
        grassroots sentiment. Finally, events involving diplomatic or material cooperation,
        demands, or rejections (Categories 5, 6, 10, and 12) provide a broader view
        of governmental and institutional stances. By analyzing these events, we could
        capture a comprehensive picture of the sentiments surrounding energy subsidy
        reforms.","descriptions":{"en":"ABOUT THIS DATA SERVICE\nGDELT monitors print,
        broadcast, and web news media from across every country in the world with
        real-time measurement of tones and 60k themes to keep continually updated
        on breaking developments anywhere on the planet. Its historical archives stretch
        back to January 1, 1979 and update every 15 minutes. The data provides multilingual
        support across 65 different languages, all of which are translated in real-time
        into English. Through its ability to leverage the world’s collective news
        media, GDELT moves beyond the focus of the Western media towards a far more
        global perspective on what’s happening and how the world is feeling about
        it. (The GDELT Project, n.d.).\nGDELT includes two databases: ”GKG (Global
        Knowledge Graph)” and ”Events”, plus an API that gets you a list of articles
        with selected keywords. Both databases have two modes: one that includes only
        ”English” written articles and a ”combined database” that includes English
        and non-English articles. The description for both databases:\n\nTable 1:
        Description of GDELT Datasets\n\nCategory\tGKG (Global Knowledge Graph)\tEvents\nDescription\tA
