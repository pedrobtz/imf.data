        World Tables","names":{"en":"Penn World Tables"},"description":"ABOUT THIS
        DATA SERVICE\nThe Penn World Tables (PWT) provide purchasing power parity
        and national income accounts converted to international prices for 182 countries/territories
        for some or all of the years 1950-2014. The European Union or the OECD provide
        more detailed purchasing power and real product estimates for their countries
        and the World Bank makes current price estimates for most PWT countries at
        the GDP level. Originally constructed by Robert Summers and Alan Heston of
        the University of Pennsylvania, together with the late Irving Kravis, the
        data is developed and maintained by scholars at the University of California,
        Davis and the Groningen Growth Development Centre of the University of Groningen
        to measure real GDP across countries and over time.​\n\nAttribution requirement
        - When using these data (for whatever purpose), please make the following
        reference:\nFeenstra, Robert C., Robert Inklaar and Marcel P. Timmer (2015),
        \"The Next Generation of the Penn World Table,\" American Economic Review,
