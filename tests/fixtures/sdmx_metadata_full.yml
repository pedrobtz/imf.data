        External Debt Hub (JEDH)","names":{"en":"Joint External Debt Hub (JEDH)"},"description":"ABOUT
        THIS DATA SERVICE\nThe Joint External Debt Hub (JEDH)—jointly developed by
        the Bank for International Settlements, the International Monetary Fund (IMF),
        the Organization for Economic Cooperation and Development (OECD) and the World
        Bank (WB)—brings together external debt data and selected foreign assets from
        international creditor/market and national debtor sources. The JEDH replaces
        the Joint BIS-IMF-OECD-WB Statistics on External Debt, a website that was
        launched in 1999 to provide international data, mainly from creditor sources,
        on the external debt of developing and transition countries and territories.
        Data available for over 175 countries, territories and offshore financial
        centers. The database provides time series data back to 1990 where available.
        Topics covered include: cross-border claims, external debt.","descriptions":{"en":"ABOUT
