        commodity prices, housing prices, and total returns on bonds, and bills from
        every major market in the world. ​\n\n​Includes current and historical exchange
        rates with currency histories and source notes. Events-In-Time correlates
        events with market activity in all markets around the world. Individual security
        prices not available for this subscription.\n\nData available as downloadable
        spreadsheet or graph. ​An API is available for downloading series as files
