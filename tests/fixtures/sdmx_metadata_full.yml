        CreditEdge Plus","names":{"en":"Moody’s CreditEdge Plus"},"description":"ABOUT
        THIS DATA SERVICE\nMoody''s Analytics CreditEdge offers a solution for measuring
        the credit risk of listed entities, sovereigns and bonds globally. Its probability
        of default model is known as the Expected Default Frequency (EDF™). EDF measures
        are based on collective, real-time intelligence from global markets that captures
        the credit insight of the equity markets and combines it with a detailed picture
        of each company''s capital structure. The CreditEdge Plus platform also combines
        the Moody''s credit spread valuation framework to provide insight into the
        dynamics of equity, bond and credit default swap markets for asset management
