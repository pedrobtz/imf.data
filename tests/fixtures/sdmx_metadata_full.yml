        Economics Consensus Forecast","names":{"en":"Focus Economics Consensus Forecast"},"description":"ABOUT
        THIS DATA SERVICE\nFocusEconomics Forecast provide data and analysis for 130
        countries based on surveys of a panel of over 300 economists on more than
        30 major economic indicators every month. Forecasts are presented by quarter
        for 2 years out and annual forecasts for 5 years ou​t, including details on
        each analysts'' projections and the Consensus Forecast, as well as maximum
        and minimum forecasts. Annual data goes back to 1990, but may vary per country.​\n​\n\nIMF
        subscription covers:\nSub-Saharan Africa - Angola, Botswana, Cote d''Ivoire,
        DR Congo, Ethiopia, Ghana, Kenya, Mozambique, Nigeria, South Africa, Tanzania,
        Uganda, Zambia\nCIS: Armenia, Azerbaijan, Belarus, Georgia, Kazakhstan, Kyrgyz
        Republic, Moldova, Russia, Tajikistan, Turkmenistan, Ukraine, Uzbekistan\nMENA:
        Algeria, Bahrain, Egypt, Iran, Iraq, Israel, Jordan, Kuwait, Lebanon, Morocco,
        Oman, Qatar, Saudi Arabia, Tunisia, UAE, Yemen\nAsia Pacific: Pakistan\n​\n​Methodology
        Sources include a wide range of regional and international financial institutions
        such as Bank of America Merrill Lynch, Barclays, Citigroup, Credit Suisse,
        DBS, Deutsche Bank, HSBC, ING, Goldman Sachs, HSBC, JP Morgan, Morgan Stanley,
        Nomura and UBS. Consensus forecasts are mean averages of projections of economic
        forecasters surveyed by FocusEconomics. Quarterly averages may not correspond
        to the annual figures due to different forecast panels. The GDP weighted averages
        for the world refer to economies surveyed by FocusEconomics on a monthly basis
        comprising more than 90% of total global output. Weights are based on market
        exchange rates and reflect the latest forecasts on GDP growth, inflation,
        and exchange rates.\n\nMain Indicators include: \n\nReal Sector:\nEconomic
        Growth (GDP, annual variation in %).\nConsumption (annual variation in %).\nInvestment
        (annual variation in %).\nIndustrial Production (annual variation in %).\nUnemployment
        Rate.\nFiscal Balance (% of GDP).\nPublic Debt (% of GDP).\nMonetary and Financial
        Sector:\nMoney (annual variation in %).\nInflation Rate (CPI, annual variation
        in %).\nPolicy Interest Rate (%).\nExchange Rate (vs USD).\nExternal Sector:\nCurrent
        Account (% of GDP).\nTrade Balance (USD billion).\nExports (USD billion).\nImports
