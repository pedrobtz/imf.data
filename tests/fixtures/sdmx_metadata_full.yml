        THIS DATA SERVICE\nPremise is a crowdsourced insights company. Its technology
        mobilizes communities of global smartphone users to source actionable, trustworthy
        data in real-time. The Premise network of on-the-ground comprises over 5.5
        million individual contributors and spans 138 countries.\n\nPremise data can
        be accessed through the Development Data Partnership, a collaboration between
        international organizations and technology companies, facilitating the efficient
        and responsible use of third-party data in international development. Access
        is assigned based on business needs. Each user is expected to submit a request
        to the Data Partnership Team at datapartnership@imf.org.\n\nThese datasets
        are available for proposals:​\n\nPrice Monitoring: Through crowdsourcing technology,
        Premise uses local contributors to capture pricing information on-the-ground
        in real time. This unique approach to data collection allows organizations
        to monitor a wide range of pricing information around the globe.\nA subset
        of these pricing data can be made available to teams through the Partnership.\n\nCOVID-19
        Data: Premise is providing pro-bono access to a wide range of covid-19 related
        datasets and dashboards through the Partnership.\nPremise COVID-19 site: A
        dedicated page at premise.com/COVID-19, where content is regularly updated
        through blogs, real-time dashboards and press releases.\n\nUkraine Data: Premise’s
        Ukraine Response team is collecting survey data through a network of local
        contributors. The premise is looking for organizations'' inputs on what data
        should be gathered.\nSo far, they have the following tasks running, please
        visit https://docs.datapartnership.org/ for more details\n- Daily Service
        Delivery Survey\n- Water and Sanitation\n- Healthcare\n- Pharmacies and Medical
        Supplies\n- Community Needs\n- Ukrainian Refugee Needs\n- Safety in your Community\n-
        Food Security\n- Displacement\n- Food Price Monitoring\n- Household Food\n\nTracking
