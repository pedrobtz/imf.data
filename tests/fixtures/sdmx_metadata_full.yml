        THIS DATA SERVICE\nMapillary is a crowd-sourced street-level imagery platform
        that uses computer vision to fix the world’s maps. Mapillary’s collaborative
        street-level imagery platform enables anyone to collect streetview imagery
        using mobile phones or connected cameras. People, companies, NGOs, and governments
        across the world regularly upload their imagery to Mapillary under a Creative
        Commons (open source license), including World Bank staff and counterparts.\n\nMapillary
        data can be accessed through the Development Data Partnership, a collaboration
        between international organizations and technology companies, facilitating
        the efficient and responsible use of third-party data in international development.
        Access is assigned based on business needs. Each user is expected to submit
        a request to the Data Partnership Team at datapartnership@imf.org.\n\nThese
        datasets are available for proposals:​\n\nMapillary Support: Mapillary is
        a collaborative street-level imagery platform. Mapillary’s tools enable anyone
        to collect street view imagery using mobile phones or connected cameras. People,
        companies, NGOs, and governments across the world regularly upload their imagery
        to Mapillary under a Creative Commons (open source license). Mapillary web-based
        tools include a “tagging” feature, which enables users to “tag” imagery with
        labels – for example, location of potholes, crosswalks, or culverts. Through
        a subscription with Mapillary teams and and their counterparts may download
        these tags for free, as .shp or .geojson files, for use in geospatial packages,
        such as ESRI ArcMap or QGIS. See this rural road inventory project in Laos
        for more information about how these tags may be used in practice: http://bit.ly/2A5Y0y9.","descriptions":{"en":"ABOUT
