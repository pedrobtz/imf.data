        Forecasts","names":{"en":"Consensus Forecasts"},"description":"ABOUT THIS
        DATA SERVICE\nSubscription includes PDF reports and Excel files for: General:
        G-7 countries and Western Europe; Asia Pacific; Eastern Europe; Latin America;
        Foreign Exchange; Energy & Metals; and Inflation.\n\nMonthly Forecasts: covering
        estimates for the principal macroeconomic variables (including growth, inflation,
        interest rates, and exchange rates) in over 70 countries.\n\nForeign Exchange
        Forecasts include coverage of the US dollar, the Chinese renminbi and the
        European euro every month for 37 major currencies and 56 additional currencies.\n\nEnergy
        & Metals Forecasts cover over 30 individual commodities.\n\nInflation Forecasts:
        Monthly forecast data 12-15 months ahead available for 47 economies in the
        G7 & Western Europe, Asia Pacific, Eastern Europe and Latin America regions.
        Coverage begins April 2024.\n\nContinuous Forecast Weekly frequency supplemental
        service to the regular monthly macroeconomic surveys. Using intra-survey forecast
        revisions collected on a daily basis, CCF provides consensus updates for GDP
        and inflation forecasts between the monthly surveys.\n\nLong-Term Forecasts:
        Four times a year (in January, April, July and October, formerly twice a year).
        Long-term forecasts include forecasts on GDP growth, Consumption, Investment,
        Consumer Prices and Interest Rates, among others. These databases are split
        into four regional modules, covering a total of 87 countries.\n\nGlobal Outlook:
        An annual report containing individual country, regional and world long-term
        forecasts for the global economy. This document covers over 50 countries and
        includes separate analyses with country and regional aggregate survey data
        covering a variety of economic indicators.\n\n\nPDF reports include certain
        sections and features which have not been incorporated into the excel spreadsheets.
        These include:\nAll charts\nAll text commentary\nSection examining Significant
        Changes in the Consensus\nSpecial surveys including Quarterly Forecasts, Long-Term
        Forecasts, Trade and Current Account Balances, Real Interest Rates, Foreign
        Direct Investment, Economic Policy Evaluation and Forecast Probabilities ​\nThe
        back page summary table\nAll historical (actual) data\nThe comparison forecasts
        (IMF, OECD, central bank and government estimates)\nDirection of Trade data\nBackground
        data\nInterest rates on survey date\nConsensus Forecasts - Library Network
        website\tWeekly, Monthly, and Long Term files from 1989 to present. Staff
        can sign up for weekly e-mail alerts\nDMXe - New!​\nConsensus Forecasts monthly
        data by individual contributor​\nAccess Instructions\n​Sample DMXe Consensus
        file\nEcOS - EcDATA\tAll Items > External Databases > Commercial Data Providers
        > Consensus Forecasts (CF)\nDownload EcOS from Software Self-Service (All
        Programs > System Tools > Enterprise Software Distribution > Software Self-Service)\nEDI\tMonthly
        and Long Term: Asia Pacific, Consensus General, Eastern Europe, and Latin
        America. Monthly: World\nIMF Data Diver (no longer maintained)\nMonthly and
        Long Term: Asia Pacific, Consensus General, Eastern Europe, and Latin America.
