        Global ","names":{"en":"EPFR Global "},"description":"ABOUT THIS DATA SERVICE\nWeekly
        and monthly international fund flows data for equities, bonds and money markets,
        weekly and monthly country/sector flows, and monthly country/sector allocations
        (weightings) from EPFR Global.\n\nData are sourced from global fund managers
        and provide an indication of changing investor sentiment toward asset classes,
        geographic regions, and sector/industry groups. Data are available for advanced
        and emerging market countries and regions.\nEquity flows are by capitalization
        style and sector.\nBond flows include high yield, balanced, mortgage-backed,
        municipal, total return and inflation protected.\nCountry and regional weightings
        are provided in percentage terms by asset class.\nCountry flows data combine
        fund flows and country allocations to estimate the flow of money into and
        out of world stock markets. Each Fund Group includes a listing of individual
        funds and their sector weightings in percentage terms, plus their weightings
        in each of 24 industry groups, in investment funds, and in cash.\nSector/Industry
        weightings are calculated into Global Industry Classification System (GICS)
        Level I and Level II.\nSector/Industry Fund flows data combine fund flows
        and sector/industry allocations data to estimate the flow of cash into and
        out of various sectors and industries.\nAbility to bulk add ISINs and FundIDs
        (an internal EPFR identifier) to custom groups in the Fund Flows dataset.\nCustom
        thematic groups across Equity Sector Funds, Bond Funds, ESG Funds, and Multi-Asset
        Funds/Unique Groups.\nIMF license includes all EPFR Global equity and bond
        fund weekly and monthly data, including complete historical data. Data sets
        include Fund Flows, Country Flows, Sector/Industry Flows, Country Allocations
        and Sector/Industry Allocations.","descriptions":{"en":"ABOUT THIS DATA SERVICE\nWeekly
