        month, annual forecasts for 15 key U.S. economic indicators are collected
        from more than 50 leading business economists and used to derive the Blue
        Chip consensus. Forecasts cover GDP, the GDP price index, CPI, IP, disposable
        personal income, personal consumption expenditures, nonresidential fixed investment,
        corporate profits, the unemployment rate, interest rates, housing starts,
        vehicle sales and exports. The consensus (mean), median, min and max forecast
        and a diffusion index are reported as well as the forecasts from the individual
