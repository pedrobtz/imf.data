        Market Intel","names":{"en":"Chainalysis Market Intel"},"description":"ABOUT
        THIS DATA SERVICE\nChainalysis Market Intel provides data to support cryptocurrency
        research. It covers about 90% of daily market volume across 120 digital assets
        including seven coins: Bitcoin(BTC), Bitcoin Cash (BCH), Ethereum (ETH), Litecoin
        (LTC), Tether (USDT), TrueUSD (TUSD), USD Coin (USDC). The Market Intel monitors
        transactions of 800 exchanges to capture crypto activity of thousands of businesses,
        fund flows on the blockchain linking it to real-world entities.\n\nChainalysis
        data is provided as 65 metrics across 10+ categories (see Chainalysis Data
        Inventory for IMF)\nDemand: total flows, regional flows, Inter exchange flows;\nSupply:
        age, gain, liquidity, wealth, properties;\nMacro: supply, price, market cap,
        thermo cap, free float, wealth concentration, average age/cost/gain/liquidity/wealth;\nEntities:
        active entities, net new entities, new addresses by category; (Entities are
        people, who are anonymous, and services, which are mostly identified. This
        metrics describe the number of active and new users of a cryptocurrency);\nPer
        Services: inflows, outflows, transfers, counterparties deposits and withdrawals
        (Services are essentially businesses, such as an exchange or an online shop,
        but can include entities that are not traditional businesses, such as a smart
        contract. An entity can hold assets, and send and receive assets via transfers
        with another entity. Chainalysis has identified 5,500+ unique services (both
        licit and illicit) that together control hundreds of millions of cryptocurrency
        addresses accounting for over $6 trillion of value transferred. Over 100 new
        services are added every week, a third of which are scams, darknet markets,
        and other illicit services);\nTransfers: transfer stats, transfers by category;\nExchanges:
        Exchange inflows/outflows, exchange change in balance, exchange counterparties,
        exchange deposits, exchange withdrawals, trade intensity;\nWhales: whale inflows/outflows/properties/transfers
        by size. (Whales metrics describe the source and destination of their assets,
        and the age, USD cost and gain, and liquidity of the assets they hold, etc.);\nGeneration:
        destination of new assets, block stats, minter balances, fees, source of assets;\nRisk:
        illicit flows, illicit placement, illicit balances. ( Risk metrics describe
        the scale of illicit activity, how illicit funds are placed, and the level
        of assets yet to be laundered).\nData History: entire history of an asset
        is provided.\nData presentation: each Market Intel metric is a panel dataset
        delivered as as CSV flat files.\nData vintages: the vendor updates the entire
        history of each metric with every vintage, but can provide older vintages
        per request\nSample Dashboards​​ (PDF)​are created in Amazon QuickSight. While
        not compatible with Power BI, the IMF staff can ask for a \"re-creation\"
        ​session with one of Chainalysis Data Scientists to help create dashboards
        in our environment.\n\n​\nAccess is provided via a shared network location.
        To request access, please email to jlcd@librarynetwork.org","descriptions":{"en":"ABOUT
        THIS DATA SERVICE\nChainalysis Market Intel provides data to support cryptocurrency
        research. It covers about 90% of daily market volume across 120 digital assets
        including seven coins: Bitcoin(BTC), Bitcoin Cash (BCH), Ethereum (ETH), Litecoin
        (LTC), Tether (USDT), TrueUSD (TUSD), USD Coin (USDC). The Market Intel monitors
        transactions of 800 exchanges to capture crypto activity of thousands of businesses,
        fund flows on the blockchain linking it to real-world entities.\n\nChainalysis
        data is provided as 65 metrics across 10+ categories (see Chainalysis Data
        Inventory for IMF)\nDemand: total flows, regional flows, Inter exchange flows;\nSupply:
        age, gain, liquidity, wealth, properties;\nMacro: supply, price, market cap,
        thermo cap, free float, wealth concentration, average age/cost/gain/liquidity/wealth;\nEntities:
        active entities, net new entities, new addresses by category; (Entities are
        people, who are anonymous, and services, which are mostly identified. This
        metrics describe the number of active and new users of a cryptocurrency);\nPer
        Services: inflows, outflows, transfers, counterparties deposits and withdrawals
        (Services are essentially businesses, such as an exchange or an online shop,
        but can include entities that are not traditional businesses, such as a smart
        contract. An entity can hold assets, and send and receive assets via transfers
        with another entity. Chainalysis has identified 5,500+ unique services (both
        licit and illicit) that together control hundreds of millions of cryptocurrency
        addresses accounting for over $6 trillion of value transferred. Over 100 new
        services are added every week, a third of which are scams, darknet markets,
        and other illicit services);\nTransfers: transfer stats, transfers by category;\nExchanges:
        Exchange inflows/outflows, exchange change in balance, exchange counterparties,
        exchange deposits, exchange withdrawals, trade intensity;\nWhales: whale inflows/outflows/properties/transfers
        by size. (Whales metrics describe the source and destination of their assets,
        and the age, USD cost and gain, and liquidity of the assets they hold, etc.);\nGeneration:
        destination of new assets, block stats, minter balances, fees, source of assets;\nRisk:
        illicit flows, illicit placement, illicit balances. ( Risk metrics describe
        the scale of illicit activity, how illicit funds are placed, and the level
        of assets yet to be laundered).\nData History: entire history of an asset
        is provided.\nData presentation: each Market Intel metric is a panel dataset
        delivered as as CSV flat files.\nData vintages: the vendor updates the entire
        history of each metric with every vintage, but can provide older vintages
        per request\nSample Dashboards​​ (PDF)​are created in Amazon QuickSight. While
        not compatible with Power BI, the IMF staff can ask for a \"re-creation\"
        ​session with one of Chainalysis Data Scientists to help create dashboards
