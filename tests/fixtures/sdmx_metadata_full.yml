        THIS DATA SERVICE\nQuadrant (An Appen Company) provides ​mobile location data,
        POI data, and corresponding compliance services. Appen provides AI training
        data that helps build and improve ​artificial intelligence systems.\n\nQuadrant
        data can be accessed through the Development Data Partnership, a collaboration
        between international organizations and technology companies, facilitating
        the efficient and responsible use of third-party data in international development.
        Access is assigned based on business needs. Each user is expected to submit
        a request to the Data Partnership Team at datapartnership@imf.org.\n\nThese
        datasets are available for proposals:​\n\nMobile Location Data: Quadrant provides
        location data and location-based business solutions that are fit for purpose,
        authentic, easy to use, and simple to organise. We offer data for almost all
        countries in the world, with hundreds of millions of unique devices and tens
        of billions of events per month, allowing our clients to perform location
        analyses, derive location-based intelligence, and make well-informed business
        decisions.\n\nPoint-of-Interest Data: Quadrant’s POI Data-as-a-Service provides
