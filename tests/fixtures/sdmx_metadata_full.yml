        THIS DATA SERVICE\nEarthmetry provides access to datasets covering electricity,
        petrolium​ production, air quality and pollution, industry, and water reservoirs
        in India.\n\nEarthmetry data can be accessed through the Development Data
        Partnership, a collaboration between international organizations and technology
        companies, facilitating the efficient and responsible use of third-party data
        in international development. Acc​ess is assigned based on business needs.
        Each user is expected to submit a request to the data partnership team at
        datapartnership@imf.org.​​\n\nThese datasets are available for proposals:\n\nIndia
        - State - Daily - Electricity Consumption and procurement: Coverage > 95%
        at state-daily level\n\nIndia - Air pollution measured using Government Pollution
        Monitors: The Central Pollution Control Board maintains pollution reference
        monitors. We capture data from all the monitors they publish on (currently
        about 300 in number) on - PM2.5, PM10, CO, SO2, NO2, O3\n\nIndia - State/District
        - Long term climate data series: The ECMWF runs a global model and produces
        a reanalysis dataset - ERA5. Earthmetry uses this gridded data for some key
        variables and produces summaries for India at State/District level by merging
        the data with state shapes (as of 2014 definition) / district shapes (as of
        2011 definition)\n\nIndia - Oil and Gas - Data: Monthly data on crude oil
        (and refined products) and natural gas imported, consumed, refined.\nSome
        time series are available for 10 years, some for about 20 years\n\nIndia -
        Forest and Farm Fires Detected by VIIRS/MODIS Satellite Instruments: Fires
        detection data is available with latitude, longitude and additional variables
        from the NASA Active Fires Management System which uses several satellites.\n\nIndia
        - Power plant daily/monthly generation: This dataset published by the central
        electricity authority and the national power portal. It covers, coal, natural
        gas, diesel, hydro and nuclear power plants in India.\nDaily generation data
        is more detailed but is labeled ''provisional''.\nMonthly generation data
        is labeled ''final''.\n\nIndia - Daily - Storage level in major water reservoirs:
        The India Water Resources Information System collects this data on water stored
