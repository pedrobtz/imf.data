        ArcGIS Living Atlas of the World","names":{"en":"Esri ArcGIS Living Atlas
        of the World"},"description":"ABOUT THIS DATA SERVICE\nEsri is a mapping,
        analytics, and location intelligence firm that works with nearly 350,000 organizations.
        ArcGIS is deployed in more than 350,000 organizations including the world’s
        largest cities, most national governments, 75 percent of Fortune 500 companies,
        and more than 7,000 colleges and universities. Esri engineers the most advanced
        solutions for digital transformation, the Internet of Things (IoT), and location
        analytics to inform the most authoritative maps in the world. It offers a
        range of capabilities such as spatial analysis and data science, field operations,
        mapping, real-time visualization and analytics, 3D GIS, imagery and remote
        sensing, data collection and management.\n\nEsri data can be accessed through
        the Development Data Partnership, a collaborati​on between international organizations
        and technology companies, facilitating the efficient and responsible use of
        third-party data in international development. Access is assigned based on
        business needs. Each user is expected to submit a request to the Data Partnership
        Team at datapartnership@imf.org.​\n\nThese datasets are available for proposals:\n\nArcGIS
        Living Atlas of the World: ArcGIS Living Atlas of the World contains authoritative
        maps on thousands of topics. You can use the Living Atlas to explore ready-to-use
        maps and data provided by organizations around the world. Through the Living
        Atlas, you can access maps and data in categories like:\n\n(a) Basemaps: The
        Living Atlas includes over a dozen vector and raster basemaps, built using
        the best available data from authoritative providers. Each one emphasizes
        a different view of our world such as topographical features, historical maps,
        streets, terrain, and imagery.\n\n(b) Imagery: The Living Atlas provides recent
        high-resolution imagery for most of the world, lower-resolution global imagery
        (updated daily), and near real-time imagery for areas affected by major events
        like natural disasters. You can also access archived imagery from the past
        five years. In addition, you can use multispectral imagery to evaluate land
        cover characteristics.\n\n(c) Boundaries—The Living Atlas includes maps and
        layers that capture administrative, environmental, and geometric boundaries.
        For example, you can access maps that delineate the borders for countries,
        regions, states, cities, administrative areas, postal codes, and more. You
        can use these boundaries maps to provide simple geographic context or to aggregate
        your data at various scales.\n\n(d) People—The Living Atlas provides maps
        that describe the characteristics of people in the US and more than 130 other
        countries. You can access maps for population, housing, employment, education,
        income, consumer spending, and hundreds of other demographic and lifestyle
        variables. These maps help you better understand people and their behavior.\n\n(e)
        Infrastructure—The Living Atlas provides infrastructure maps that cover topics
        like transportation, buildings, utilities, businesses, and agriculture. You
        can overlay your own data against these maps to see the relationship between
        your operations and underlying infrastructure. Some of these maps are dynamic,
        such as the live World Traffic Map, which is updated every few minutes with
        data on traffic incidents and congestion.\n\n(f) Environment—The Living Atlas
        includes maps about the systems that make up our natural environment. For
        example, you can access earth observations layers (from sources like NOAA
        and USGS), oceans content, elevation and bathymetry data, weather and climate
        observations, land cover maps, and more. With these maps, you can make more
        environmentally informed decisions.\nIn addition to the rich geographic content,
        you can request access to ArcGIS Online in order to manage, analyze and share
