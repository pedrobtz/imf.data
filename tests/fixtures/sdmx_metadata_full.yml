        THIS DATA SERVICE\nJBA is a specialist flood, climate and environmental risk
        management consultancy, employing over 700 staff across 26 offices globally,
        including in the US, UK, Romania, Singapore, Cambodia and Australia. JBA works
        extensively for the World Bank, Asian Development Bank, other International
        Development (ID) banks and NGOs, governments and the insurance sector, delivering
        thousands of projects each year. In addition to undertaking consultancy work,
        JBA develops and licenses datasets and products, such as global flood hazard
        maps which are now offered through the Development Data Partnership.\n\nJBA
        data can be accessed through the Development Data Partnership, a collaboration
        between international organizations and technology companies, facilitating
        the efficient and responsible use of third-party data in international development.
        Access is assigned based on business needs. Each user is expected to submit
        a request to the Data Partnership Team at datapartnership@imf.org.\n\nThese
        datasets are available for proposals:​\n\nGlobal Flood Hazard Maps: 30m resolution
        river and surface water flood hazard maps. Available for every country in
        the world for 6 return periods. Flood extents and depth grids are available
        as Tagged Image File Format (i.e., ‘.tif’ format). Defended area layers indicating
        areas that are protected from flooding are also available for some areas/countries.
