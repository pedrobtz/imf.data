        AI","names":{"en":"Atlas AI"},"description":"Established in 2018, Atlas AI
        was founded in partnership with The Rockefeller Foundation by a team of Stanford
        University scientists from the fields of agricultural ecology, development
        economics, and computer science. The founding team pioneered techniques involving
        machine learning analysis of satellite imagery in regions without sufficient
        ‘ground truth’ data to train traditional algorithms. Atlas AI uses those techniques
        to develop key socioeconomic data sets such as staple crop classification
        and yield estimation, localized asset wealth and consumption levels, and infrastructure
        quality. The Atlas AI products are analytical tools built to help operators
        across a range of industries -- from food and agriculture, to transportation
        and telecommunications, to international development -- make better decisions
        about which markets to enter, where to deploy capital, and how to more productively
        operate their business.​\n\nAtlas AI data is available via the Development
        Data Partnership (DDP), a collaboration between international organizations
        and technology companies, facilitating the efficient and responsible use of
        third-party data in international development. Atlas AI access is assigned
        based on business needs. Each user is expected to submit a reques​​t to the
        data partnership platform atdatapartnership@imf.org.​\n        These datasets
        are available for proposals:\n       Cropland Maps for Kenya, Malawi and Ethiopia:
        High-resolution cropland maps estimated at a 10 meter per pixel resolution.
        To generate these data, we manually tag land cover types on high-resolution
        imagery as cropland or not cropland. We then train a random forest model to
        estimate cropland status using predictors including satellite time-series
        imagery, weather, and terrain features.\n       Maizeland Maps for Malawi
        and Ethiopia: High-resolution maizeland maps estimated at a 10 meter per pixel
        resolution. To generate these data, we collate crop type observations from
        geospatial microdata surveys from the World Bank’s LSMS-ISA program. We then
        train a random forest model to estimate whether maize was present in a given
        pixel using predictors including satellite time-series imagery, weather, and
        terrain features. These data were developed in collaboration with the World
        Bank’s Development Data Group (Working Paper).\n       Maizeland Masks for
        Malawi and Ethiopia: High-resolution maize masks estimated at a 10 meter per
        pixel resolution. To generate these data, we first use our cropland maps to
        remove all pixels that were not cultivated with any crops. We classify pixels
        with probability of crop cultivation greater than 40 percent as cropped pixels.
        We then use our maizeland maps to identify which of the cultivated pixels
        were cultivated with maize. In Malawi, pixels with probability of maize cultivation
        greater than or equal to 60 percent are assumed to be cultivated with maize.
        We use a threshold of 50 percent in Ethiopia. These data were developed in
        collaboration with the World Bank’s Development Data Group (Working Paper
        ,Ethiopia raster data, Malawi raster data).\n       Maizeland Maps for Kenya:
        High-resolution maize area maps estimated at a 10 meter per pixel resolution.
        To generate these data, we collate crop type observations from One Acre Fund
        and Radiant ML hub. We then train a random forest model to estimate whether
        maize was present in a given pixel using predictors including satellite time-series
        imagery, weather, and terrain features.\n       Maize Yield Estimates for
        Kenya: High-resolution maize yield maps generated at a 10 meter per pixel
        resolution. To generate these data, we first estimate maize yields using the
        Scalable Crop Yield Mapping (SCYM) algorithm. The SCYM algorithm uses crop
        simulation models to model the relationship between crop yield and satellite-derived
        vegetation index values and seasonal weather. The model is then used to estimate
        maize yield at a pixel level across space.\n       Crop Area and Production
        for 50 African Countries: Statistics on crop area and total production for
        maize, sorghum, and rice, all at the Admin 2 level for the entire continent
        of Africa. The primary input data for these statistics comes from International
        Food Policy Research Institute''s (IFPRI) Spatial Production Allocation Model
        (SPAM) from 2000, 2005, 2010, and 2017. Our methodology seeks to extract trends
        in agricultural variables such as area, production, and yield for relevant
        crops at the Admin 2 level. These trends enable us to make annual predictions
        for both crop area and production for maize, sorghum, and rice.\n       Asset
        Wealth for 50 African Countries: High-resolution time series data on asset
        wealth. To generate these data, we collate locally-representative survey data
        on household asset ownership to create an asset wealth index (AWI): the first
        principal component of a principal component analysis (PCA) computed on those
        assets over those households. We then train a convolutional neural network
        to predict village-aggregated values with satellite imagery, validating on
        data the model was not trained on.\n       Electrification for 50 African
        Countries: The availability of energy access infrastructure (i.e., electrification)
        and estimates the timing when that infrastructure first became available,
        all at a spatial resolution of 15 arc seconds (~450 meters). The primary input
        data for these estimates are openly available monthly nighttime lights data
        recorded by the day/night band (DNB) of Visible Infrared Imaging Radiometer
        Suite (VIIRS). Our proprietary methodology seeks to model the time series
        of illuminance values as a piecewise linear regression. This allows us to
        identify the breakpoints between different linear regressions and then assess
        whether a given linear regression segment is more likely to be indicative
        of an area with or without electricity.\n       Crop Area and Production for
        49 African Countries (2000-2020): Statistics on crop area and total production
        for maize, sorghum, and rice, all at the Admin 2 level for the entire continent
        of Africa. The primary input data for these statistics comes from International
        Food Policy Research Institute''s (IFPRI) Spatial Production Allocation Model
        (SPAM) from 2000, 2005, 2010, and 2017. Our methodology seeks to extract trends
        in agricultural variables such as area, production, and yield for relevant
        crops at the Admin 2 level. These trends enable us to make annual predictions
        for both crop area and production for maize, sorghum, and rice. Temporal extent:
        2000-2020. Temporal resolution: annual. Spatial extent: African continent.
        Spatial resolution: Administrative boundary levels 1 and 2. Units: hectares
        for area, metric tonnes for production.​\n","descriptions":{"en":"Established
