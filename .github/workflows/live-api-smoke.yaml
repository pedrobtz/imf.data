on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

name: live-api-smoke

permissions: read-all

jobs:
  cpi:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, local::.
          needs: check

      - name: Query current CPI observations
        shell: Rscript {0}
        run: |
          devtools::load_all()
          result <- get_data(
            "CPI",
            filters = list(
              COUNTRY = "USA",
              INDEX_TYPE = "CPI",
              COICOP_1999 = "_T",
              TYPE_OF_TRANSFORMATION = "IX",
              FREQUENCY = "M"
            ),
            last_n_obs = 2
          )
          stopifnot(
            nrow(result) == 2L,
            all(c("TIME_PERIOD", "OBS_VALUE") %in% names(result)),
            all(is.finite(result$OBS_VALUE))
          )
