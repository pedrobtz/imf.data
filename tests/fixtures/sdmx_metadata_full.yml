        Global Supply Chain Database","names":{"en":"Eora Global Supply Chain Database"},"description":"ABOUT
        THIS DATA SERVICE\nThe Eora global supply chain database consists of a multi-region
        input-output table (MRIO) model that provides a time series of high-resolution
        IO tables with matching environmental and social satellite accounts for 190
        countries. The Eora MRIO features:\na balanced global MRIO table documenting
        the inter-sectoral transfers amongst 15,909 sectors across 190 countries\na
        complete timeseries for 1990-2023​\n2720 line item environmental indicators
        covering GHG emissions, labour inputs, air pollution, energy use, water requirements,
        land occupation, N and P emissions, primary inputs to agriculture (including
        172 crops) from FAOSTAT, and Human Appropriation of Net Primary Productivity
        Full list\na high-resolution version (full Eora) preserving national IO table
        detail, and a simplified version (Eora26) with 26-sector harmonized classification\nraw
        data drawn from a wide range of national and international data sources\nreliability
        statistics for all results\nEora is available in several formats:\nIndividual
        country IO tables The individual country tables are available for download.
        These contain the domestic IO or SUT tables, for each country, primary input
        and final demand blocks, imports and exports itemized by partner, and environmental
        satellite accounts. Note that these tables have mixed structures so for analysis
        requiring comparisons across countries we recommend using the simplified Eora26
        model.\nEora26 This is a complete global MRIO table, plus environmental satellite
        account, in a harmonized 26-sector classification.\nFull Eora This is the
        complete Eora MRIO table. Contains 5 margins (basic prices, trade margin,
        transport margin, taxes, and subsidies), mixed classification CIOT/IIOT/SUT
        tables, and full rectangular trade blocks. Only available to academic users
        with email registration; other users will need to purchase a license.\nAdditionally,
        some applications and analyses built using Eora are available under the Applications
        menu:\nSector/product-level footprints\nNational carbon footprints\nEnvironmental
        footprints\nCity footprints\n​​","descriptions":{"en":"ABOUT THIS DATA SERVICE\nThe
