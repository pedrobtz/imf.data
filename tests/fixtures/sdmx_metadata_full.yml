        Displacement Data Hub, a joint initiative by the IMF and UNHCR, provides comprehensive
        data for analyzing the macro-economic challenges related to forced displacement.
        It contains open-source qualitative and quantitative data from the UNHCR and
        21 other data providers. It covers both refugees and internally displaced
        people for all countries and allows for cross‑country comparison of key indicators
        and metrics. The Dashboard enables users to quantify the macro-economic impact
        of forced displacement and supports evidence-based policy making, program
        design, and research and analytics. It also offers a glossary of terms, literature
        review, details on data sources and compilation methodology, and key contacts
        to facilitate collaboration in support of impacted economies. The Dashboard,
        developed in PowerBI, offers a variety of functionalities and interactive
        visuals, and contains direct links to the primary data providers, to facilitate
        access to the different data sources."},"id":"FULL_DESCRIPTION","attributes":[]},{"value":"","id":"AUTHOR","attributes":[]},{"value":"IMF","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"","id":"PUBLISHER","attributes":[]},{"value":"datahelp@imf.org","id":"CONTACT_POINT","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]},{"value":"","id":"TOPIC_DATASET","attributes":[]}