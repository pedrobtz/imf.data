        Job Postings","names":{"en":"Indeed-Online Job Postings"},"description":"ABOUT
        THIS DATA SERVICE\nIndeed is a worldwide search engine for job listings. Companies
        post jobs directly to Indeed. In addition, Indeed aggregates jobs from global
        websites, such as employer career sites, and other sources, such as applicant
        tracking systems.\n\nIndeed data are available daily since January 2018. Data
        are available as aggregate daily counts for the following countries: Australia,
        Austria, Belgium, Brazil, Canada, France, Germany, Hong Kong SAR, Ireland,
        Italy, Japan, Mexico, The Netherlands, New Zealand, Poland, Singapore, Spain,
        Sweden, Switzerland, United Kingdom, United Arab Emirates, United States.\nDaily
        total job posts count by country (stock)\nDaily 7 days or less old job posts
        count by country (new job postings)\nDaily total job posts count by job category\nDaily
        total job posts count by sub-national geographical area.\n\nIndeed data are
        also available at record (job post) level for a selected number of countries
        (currently AU, CA, DE and GB only). Each job post is given an ID code and
        include information from the job posting, such as title, posting date, company
        and location.\n\nAccess is provided via a SQL database managed by BigData-Support@imf.org.
        You will need to log in to a high performance server to work with the data.\n\nTo
        request access: contact IMF Library Content Development Team and cc BigData-Support@imf.org
