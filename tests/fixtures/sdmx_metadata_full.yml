        Data Lab","names":{"en":"World Data Lab"},"description":"ABOUT THIS DATA SERVICE\nWorld
        Data Lab (WDL) is a data enterprise that produces ​estimates for spending
        and demography. Its data models are global, granular, and forward-looking
        and track the Sustainable Development Goals in real-time, helping provide
        unique insights for businesses.​\n\nWDL data can be accessed through the Development
        Data Partnership, a collaboration between international organizations and
        technology companies, facilitating the efficient and responsible use of third-party
        data in international development. Access is assigned based on business needs.
        Each user is expected to submit a request to the Data Partnership Team at
        datapartnership@imf.org.\n\nThese datasets are available for proposals:\n\nWorld
        Poverty Clock, WPC: The WPC provides country-level data on the number of individuals
        living in poverty broken down by their age, gender, and whether they’re living
        in a rural or urban environment. The data spans from 2016 out to 2030 and
        can be compared against the reduction rate required to achieve SDG 1.\n\nWorld
        Emissions Clock WEC: The WEC provides country-level data on the volume of
        emissions produced broken down across 5 sectors and 24 sub-sectors of the
        economy, spanning from 2020 out to 2050. Total emissions rates can be observed
        as well as emissions per capita. Emissions projections (business as usual)
        can also be compared against different scenarios: NDCs Achieved and Paris
        Agreement Goal Reached - this enables users to hold policymakers and regulators
        accountable.\n\nAccess to a sample of World Data Pro, WDPro: WDPro provides
        global demographic and consumer spending that is forward-looking out to 2034.
        Within the Development Data Platform, users will be able to request access
        to a sub-set of the dataset: Forward-looking demographic and expenditure data
        at the continent-level - not the country, city or state/provincial level data
        that is available within the full platform.\n\n","descriptions":{"en":"ABOUT
