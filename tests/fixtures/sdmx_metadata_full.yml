        Analytics API for Text Mining","names":{"en":"Factiva Analytics API for Text
        Mining"},"description":"ABOUT THIS DATA SERVICE\n​ The Factiva Analytics API
        provides counts of articles for you to create time series and charts.\nDownload
        of articles for text mining require additional licensing and subscription
        fee from your Department.\n\nFactiva Service\tText-Mining (w/o AI tools)​\t​AI
        use (non-Gen AI, no summaries)​\n​Gen AI use (Gen AI / summaries)​\nFactiva.com\tNo\n​No\t​No\nFactiva
        Analytics API (no article downloads)\tNo article text analysis. Only count
        of articles.\tNo\tNo\nFactiva AI Analytics API for text mining (with article
        download)\tYes, with additional license and fee. As of 2025, a license for
        up to 1M articles download ​​will cost $10,275.20​​.\tYes but use case to
        be discussed with Factiva / Dow Jones, and additional license and fee\tNo\nFactiva
        News Archive for Text Mining\tYes, based on 20M articles which are included
        in the archive\nYes, for numerical or categorical outputs\tNo\n​​​​​​​ ​ ​\nFor
        article count, you may share time series and charts, and include them in ​pub​​lications
        with appropriate attribution and in limited amounts. They cannot be incorporated
        in any commercial applications.\nAccess is provided via Jupyter n​​otebook
        with API key. The following technical restrictions apply:\nEach endpoint call
        (explains or analytics) must go to completion, with a response back, before
        a new call is initiated\nA maximum of 10 calls will be initiated per hour\nMandatory
        review process\nTo gain access to the Factiva API, a review of your project
        is required. Please provide the following details to the IMF Library Content
        Development Team to start the process:\nProject name\nPrincipal contacts\nShort
        description of the project\nWhether​ a script will be used (with description
        of script workflow)\nRough estimate of the number of times the API will be
        executed to retrieve a count\nUpon review, the vendor will advise if additional
        consultation is needed, and then we will be able to provide you the API key.\n\nYou
        might find it helpful to review the following documentation and sample cases
        as you prepare responses:\nAPI documentation​\nCase #1: Use the API to count
        all articles that are economic news about Mergers and A​cquisitions for Fortune
        500 for 1990-2023\nThis is a single API transaction and there are no throttling
        concerns\nThe results would be time series of article counts over time broken
        up by daily, weekly, monthly, or annually as specified when executing the
        API\nCase #2: Use the API in a script to run the count of a keyword mentioned
        in all economic news from 1990-2023\nThen the script will repeat the API call
        for the next keyword\nIf there are 100 keywords, that would require 100 API
        calls\nIn this situation the script must be timed to not fire off an API call
        too frequently\nIf it does run too frequently it will trigger an overuse alarm
        on the Dow Jones side and lock out the account\nNote​ that our Factiva Analytics
        subscription does not provide for downloading articles, ​it is only intended
        for counts of articles.\n\nYou can use Factiva.com to check the relevancy
        of the articles you pull in Factiva Analytics; however you can''t download/share/store
        significant numbers of articles pulled from Factiva.com.\n\n​Our main Factiva.com
        contract does not support text mining. If you have such project, where you
        need to download a significant number of articles, you will need an additional
        license. A license for up to 1 million articles will cost $10,275.20​​. You
        can estimate the size of the archive you would need by searching Factiva.com
        with your criteria. You will need to contact the Library at IMF Library Content
        Development Team​ and consult with your department budget officer if you are
        interested in this option ​as the cost of the archive will be paid by your
