        ICT indicators included in the database cover fixed-telephone, mobile-cellular,
        fixed-broadband and mobile-broadband services, as well as statistics concerning
        international connectivity, quality of service, traffic, persons employed,
        ICT prices, revenue, investment and data on ICT access and use by households
        and individuals. Selected demographic and macro-economic statistics are also
        included in the database. More detailed data on ICT access and use by households
        and individuals are available in pre-defined tables. Notes including metadata
        are also included.\n\nThe data are collected from the annual statistical questionnaires
        sent out by the Telecommunication Development Bureau (BDT) of ITU to telecommunication
        ministries, regulators and national statistical offices.​"},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:ECONFINDATA(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"The
