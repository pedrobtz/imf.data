        THIS DATA SERVICE\nMapbox is a mapping platform built for software designers
        and developers. Mapbox code powers a range of geospatial services, including:
        maps, geocoding, turn-by-turn navigation, route optimization, interactive
        data visualization, and custom map styles.\n\nMapbox data can be accessed
        through the Development Data Partnership, a collaboration between international
        organizations and technology companies, facilitating the efficient and responsible
        use of third-party data in international development. Access is assigned based
        on business needs. Each user is expected to submit a request to the Data Partnership
        Team at datapartnership@imf.org.\n\nThese datasets are available for proposals:​\n\nMapbox
        Boundaries: Mapbox Boundaries comprise 4 million global boundaries. Boundaries
        has multiple data layers -- administrative, legislative, locality, postal,
        statistical -- that come cartographically-matched, georeferenced, and processed
        as Mapbox vector tiles. The curated data covers everything from Chinese prefectures
        to French arrondissements to Japanese postal codes. Polygons are fully detailed
        and edge-matched at all zoom levels, and maintained with regular data updates,
        for the most accurate data on the market. Mapbox Boundaries enable comprehensive
        geospatial analysis such as customized sales territory planning, supply chain
        optimization and risk management, real estate portfolio management, or any
        type of business intelligence analysis among many other use cases.\n\nMapbox
        Movement Data: Mapbox Movement is a global data set derived from 20B+ location
        updates daily, which may be used to understand aggregate activity, density,
        and movement over time at the city, regional, or country scale. This continually-updated
        data set can be used for pandemic response, retail expansion and site selection,
        advertising, transportation planning, demand modeling, and impact analysis.
        Teams may request sample data for a specific area of interest through the
        proposal form.\n\nMapbox Traffic Data: Access Mapbox Traffic Data to add to
        any map — HERE, TomTom or OpenStreetMap. Build your custom routing engine,
        automotive platform or traffic analysis solution with industry-leading accuracy
        for live and typical traffic, drawn from a globally distributed user base
        of more than 600M Monthly Active Users, continually benchmarked and validated
        for accuracy. Use Mapbox Traffic Data to power accurate ETAs and efficient
        dispatch for logistics and delivery fleets. Leverage this comprehensive data
        feed to understand historical and real-time vehicle speeds for road analysis
        and geo-spatial insights.\n\nMapbox Matrix API: Mapbox Matrix API is built
        on anonymized mobile device telemetry data and supports large scale traffic
        and road network analyses. The API may be used to identify areas poorly served
        by critical services, determine the best placement for new infrastructure,
        or to design the most efficient way to distribute resources. The API depends
        on two sources: (a) the OpenStreetMap (OSM) road network; (b) traffic derived
        from telemetry. The API is currently enabled for a limited number of countries,
        and accuracy depends on the completeness of OSM data and available telemetry.
        After a request for use of this API, Mapbox will assess data coverage for
        the requested geography. Mapbox looks to learn from – and collaborate on –
        high impact projects that illustrate the value of this API in developing countries.\n\nMapbox
        Isochrone API: The Mapbox Isochrone API computes areas that are reachable
        within a specified amount of time from a location, and returns the reachable
        regions as contours of polygons or lines that you can display on a map. This
        API also supports contours based on distance. With the Isochrone API, you
        can: Calculate isochrones up to 60 minutes using driving, cycling, or walking
        profiles Define delivery or service zones based on travel times from a starting
        location Illustrate travel times on a map with lines or polygons Create geofences
        to trigger location-aware user experiences, notifications, or events\n\n","descriptions":{"en":"ABOUT
