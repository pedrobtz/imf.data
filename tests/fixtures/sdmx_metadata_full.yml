        Professional","names":{"en":"Bloomberg Professional"},"description":"ABOUT
        THIS DATA SERVICE\nProvides current and recent historical financial data on
        individual equities, stock market indices, fixed-income securities, currencies,
        commodities, futures, and foreign exchange for both international and domestic
        markets. The Bloomberg Excel Add-in is a tool that delivers Bloomberg data
        directly into an Excel spreadsheet for custom analysis and calculations.\n\nBloomberg
        news is also available in these sources:\nCOM''s IMF News Report\nEBSCOhost
        - Bloomberg.com with 2-days embargo\nBloomberg.com - limited to 150 users\nACCESS
        TO BLOOMBERG ​7​ Bloomberg kiosks​ are accessible in HQ, while 15 of the Bloomberg
        Professional licenses continue to be temporarily assigned to designated users
        across departments. The designated users can update files for you and do research
        on your behalf.\nUsers in AFR, APD, CSF, EUR, MCD, MCM, RES, SPR, and WHD:
        Reach out to the designated license holder on the list\nUsers in all other
        departments: Reach out to Tatiana Goriainova (tgoriainova@imf.org) in the
        IMF Library.\n\nSubsets of Bloomberg data are available via data license and
        accessible to all staff from their desktops:\nBloomberg Data License (searchable
        in EcOS and EDI)\nBloomberg Government Bonds Data License\nBloomberg High
        Frequency Data\n​​Data Limits:​ ​Data extracted through the Excel API is subject
        to monthly download limits. Please be judicious in downloading data to avoid
        hitting the limits for yourself and all other users. Once the monthly limit
        is reached at a terminal, data cannot be downloaded until the start of the
        next month.​\n\nIf the monthly limit has been reached on a terminal:\nReport
        it to Bloomberg: Hit the Bloomberg Help key (F1) twice. Via a chat with the
        Helpdesk ask them to boost the limit. Bloomberg will ask for the details of
        the research that caused the overage.\nIf you are not sure or do not know
        what caused the limit issue - please report to it to the IMF ​Library Content
        Management and Data Licensing Team, jlcd@librarynetwork.org.​ ​​","descriptions":{"en":"ABOUT
