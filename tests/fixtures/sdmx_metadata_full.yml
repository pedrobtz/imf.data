        THIS DATA SERVICE\nSpaceKnow empowers decision-makers with ultra large-scale
        planetary analysis.\n\nSpaceKnow data can be accessed through the Development
        Data Partnership, a collaboration between international organizations and
        technology companies, facilitating the efficient and responsible use of third-party
        data in international development. Access is assigned based on business needs.
        Each user is expected to submit a request to the Data Partnership Team at
        datapartnership@imf.org.​\n\nThese datasets are available for proposals:​\n\nSpaceKnow
        Air Pollution Nowcasting Package: We are passionate about the fight to protect
        our planet. Luckily, there are over 300 satellites keeping an eye on Earth
        from orbit. Our task is simple: use satellite data to detect changes at locations
        over time. Our algorithms find the answers you are looking for. For the Development
        Data Partnership, we offer SK Air Pollution Environmental Product, also known
        as SpaceKnow Nowcasting Solutions. This data set uses observations from the
        Sentinel-5 Precursor (Sentinel-5P) satellite of the European Commission’s
        Copernicus Earth Observation Programme. SpaceKnow takes the data and corrects
        for missing or inconsistent observations and then creates a mean value of
        gas/pollutant measurements aggregated based on satellite revisit rates into
        a single index by country. Sentinel-5P is a polar orbiting satellite that
        completes 14 orbits of the Earth a day. It carries the TROPOspheric Monitoring
        Instrument (TROPOMI) which is a spectrometer that senses ultraviolet (UV),
        visible (VIS), near (NIR) and short wave infrared (SWIR) to monitor ozone,
        methane, formaldehyde, carbon monoxide, nitrogen dioxide and sulphur dioxide
        in the atmosphere. The satellite was launched in October 2017 and entered
        routine operational phase in March 2019. In this uncertain time, our data
        can save you time, enabling you to focus on building a better future.\n\nSpaceKnow
        China Nowcasting Country Package: SpaceKnow has been using satellite data
        to understand the economy since its inception in 2014. With access to the
        world’s most comprehensive collection of earth observation imagery, proprietary
        ML/AI algorithms, and a seasoned team of engineers and scientists, we provide
        traders, portfolio managers, corporate strategists, economists, and governments
        a unique view from above. For the Development Data Partnership, we offer SpaceKnow
        China Nowcasting Country Package. To create this dataset, we employ state-of-the-art
        SpaceKnow technology for the analysis of billions of all-weather SAR images
        of key industrial locations to provide high frequency near real-time activity
        data across a variety of countries and industries. We provide our customers
        a front row view of the ebb and flow of a country’s macro-economy as objectively
        observed by machines.\n\nSpaceKnow Malaysia Nowcasting Country Package: SpaceKnow
        has been using satellite data to understand the economy since its inception
