        use of third-party data in international development. Access is assigned based
        on business needs. Each user is expected to submit a request to the Data Partnership
        Team at datapartnership@imf.org.\n\nThese datasets are available for proposals:\n\nWorld
        Poverty Clock, WPC: The WPC provides country-level data on the number of individuals
        living in poverty broken down by their age, gender, and whether they’re living
        in a rural or urban environment. The data spans from 2016 out to 2030 and
