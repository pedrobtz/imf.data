        & Data (LCD)"},"description":"ABOUT THIS DATA SERVICE\nPitchBook/ Leveraged
        Commentary & Data (LCD) is a leading provider of leveraged loan news, analytics,
        and index products, also focusing on the high yield and investment grade bond
        markets.\n\n​The ownership has changed from S&P Global Market Intelligence
        to PitchBook.\n\n​​I​MPORTANT: ​Any external publications​ based on PitchBook
        content must first be approved in writing by PitchBook, and comments must
        be reflected. ​Contact PitchBook ​one​ month before planned publication ​date
        ​with a draft of the proposed Pitc​hBook-based content.\nPitchBook contact:
        ​support@pitchbook.com​ and ​cc:​ ​brian.collins@pitchbook.com​​ and dave.irwin@pitchbook.com​
        ​​​\n​\nWhat is provided:\n\nLCD News\nReal-time coverage of the U.S./European
        leveraged loan and high yield bond markets, from deal inception through the
        trading life of the debt, along with investment grade bond issuance, distressed
        debt, corporate bankruptcies, middle market transactions and CLO/fundraising.
        Also: trend analysis, weekly market wrap-ups, and monthly/quarterly analysis.\n\nLCD
        Research\nWeekly, monthly, quarterly research detailing virtually every metric
        of the leveraged loan market, including structure, pricing, yield, volume,
        along with secondary market performance and LBO/private equity activity.\n\nIndex\nThe
        S&P/LSTA Index tracks the 100 largest loans in the S&P Global Leveraged Loan
        Index, using market bids from third-party providers. LCD’s European Leveraged
        Loan Index (the ELLI) is a gauge to track performance of the asset class in
        the European market.\n\nMiddle Market\nImproving commercial loan portfolio
        performance of small to medium sized enterprises via pricing guidance.","descriptions":{"en":"ABOUT
