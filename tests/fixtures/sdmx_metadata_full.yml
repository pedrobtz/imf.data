        for International Settlements (BIS) Restricted Data-Data Bank for International
        Banking and Financial Statistics (DBSonline)","names":{"en":"Bank for International
        Settlements (BIS) Restricted Data-Data Bank for International Banking and
        Financial Statistics (DBSonline)"},"description":"Bank for International Settlements
        (BIS) restricted data reported for the BIS International Banking Statistics
        (IBS). These statistics cover the balance sheets of internationally active
        banks. The locational statistics provide information about the geographical
        and currency composition of banks'' assets and liabilities, including intragroup
        business. The consolidated statistics measure banks'' country risk exposures
        on a worldwide consolidated basis. Both data sets are collected under the
        auspices of the Committee on the Global Financial System and reported to the
        BIS at a country, rather than individual bank, level.\n\nThe IMF has identified
        a number of internal and external analytical exercises for which use of the
        BIS IBS restricted data is needed, including: (i) financial interconnectedness;
        (ii) early warning exercises; (iii) vulnerability exercises; (iv) capital
        flows transmission channels; (v) spillover reports, WEO, GFSR and country
        staff reports; and (vi) other related work, including Working Papers.","descriptions":{"en":"Bank
