d":"SOVEREIGN_WEALTH_FUND_INSTITUTE_SWFI","name":"Sovereign
        Wealth Fund Institute (SWFI)","names":{"en":"Sovereign Wealth Fund Institute
        (SWFI)"},"description":"ABOUT THIS DATA SERVICE\nThe Sovereign Wealth Fund
        Institute a US-based organization which studies global sovereign wealth funds
        and other long-term governmental investors in the areas of asset allocation,
        risk, governance, economics, policy, trade, investing and other related issues.
        SWFI covers investment industry overall, including SWFIs, institutional investors,
        asset managers and pension funds and provides data across institutional investor
        contacts, profiles, AUM, flow data, rankings, asset allocation, transactions,
        and RFPs.\n\nSome of the data - assets, people and strategy - comes from Regulatory
        sources per country and is updates quarterly; while the transactions and news
        - are sourced from public sources with more real time updates.\n\nSWFI provides
        publications, journals and a database covering SWFs and sector-related events.
        Its research and commentary cover key and insight on issues and trends related
        to sovereign wealth.\nSWF transaction database (SWFTD) is an online database
        tracking Sovereign Wealth Fund transactions from 1980 till present. It covers
        direct deals in sovereign wealth funds, pensions, asset owners, and other
        entities.\nSovereign wealth quarterly is a flagship publication on sovereign
        wealth market including commentary, transparency analysis, asset allocation
        reports, SWF directory, Fund ranking.\nSWF strategic index is a market capitalisation
        - weighted index that gauges strategic SWF investment in public equity market
        around the world.\nThe Linaburg-Maduell Transparency Index is a 10-point scale
        based on ten principles of transparency, each adding one point to the index
        rating. The index is used by sovereign wealth funds in their annual reports\n​
        Access is provided via the web site. API is not available with our subscription.","descriptions":{"en":"ABOUT
