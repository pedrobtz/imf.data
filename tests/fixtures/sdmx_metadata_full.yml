        National Summary Data Pages (NSDP)","names":{"en":"SDDS National Summary Data
        Pages (NSDP)"},"description":"ABOUT THIS DATA SERVICE\nCountries that subscribe
        to the IMF''s Special Data Dissemination Standard make a commitment to observe
        the standard and to provide information about their data and data dissemination
        practices (metadata) for the Dissemination Standards Bulletin Board (DSBB).\n\nThe
        National Summary Data Pages (NSDPs) provided on the DSBB are intended to provide
        quick access to a single comprehensive source of economic and financial data
        consistent with the data categories and components described in the subscriber''s
        metadata. Additionally, many NSDPs provide further links to national internet
        data or information sites. Data are provided for the latest two observations
        and historical links are provided by some countries.\n\nTopics covered include:
        balance of payments statistics, banking statistics, central government debt,
        consumer price index, economic indicators, exchange rates, external debt,
        GDP growth, government finance, interest rates, International trade, investment,
        labor markets, national accounts, national income, population, portfolio investments,
        prices, social indicators.\n​","descriptions":{"en":"ABOUT THIS DATA SERVICE\nCountries
