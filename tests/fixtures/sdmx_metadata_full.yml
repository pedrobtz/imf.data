        Capital IQ Pro (formerly Global Market Intelligence)","names":{"en":"S&P Capital
        IQ Pro (formerly Global Market Intelligence)"},"description":"ABOUT THIS DATA
        SERVICE\nGlobal database of detailed information on banks and financial institutions.
        Standardized corporate, financial, market and M&A data, real-time news, ratings,
        regulatory data, research, and analytics on tens of thousands of financial
        institutions including publicly traded banks, thrifts, insurance companies,
        insurance brokers, specialty finance companies, investment companies, broker/dealers,
        investment companies, and financial technology companies. Includes a 20-year
        news archive.\n\nS&P Capital IQ Pro includes profiles for 106,000 public companies,
        50 million private companies and over 25,000 private equity firms worldwide.
        Its company intelligence includes detailed financials, transactions, competitive
        landscape, corporate governance, and historical filings. Cap IQ Pro has detailed
        industry information, including asset level data, regulatory financials, and
        research, highlighting the Banking and Insurance and Metals & Mining Industries.
        The screening tool allows you to screen for Companies, Equities, Fixed Income,
        Key Developments, Transactions, and Asset level data based on quantitative
        and qualitative criteria, and create macro-level views on the results.\n\nMI
        Office Excel add-in application “S&P Cap IQ Pro” allows you to pull real-time
        data into an Excel spreadsheet.\n\nTo cite as a resource, use ''S&P Capital
        IQ Pro''.​\nCurrent Capital IQ ​users will need to register separately to
        access Capital IQ Pro.​","descriptions":{"en":"ABOUT THIS DATA SERVICE\nGlobal
        database of detailed information on banks and financial institutions. Standardized
        corporate, financial, market and M&A data, real-time news, ratings, regulatory
        data, research, and analytics on tens of thousands of financial institutions
        including publicly traded banks, thrifts, insurance companies, insurance brokers,
        specialty finance companies, investment companies, broker/dealers, investment
        companies, and financial technology companies. Includes a 20-year news archive.\n\nS&P
        Capital IQ Pro includes profiles for 106,000 public companies, 50 million
        private companies and over 25,000 private equity firms worldwide. Its company
        intelligence includes detailed financials, transactions, competitive landscape,
        corporate governance, and historical filings. Cap IQ Pro has detailed industry
        information, including asset level data, regulatory financials, and research,
        highlighting the Banking and Insurance and Metals & Mining Industries. The
        screening tool allows you to screen for Companies, Equities, Fixed Income,
        Key Developments, Transactions, and Asset level data based on quantitative
