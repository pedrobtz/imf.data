        Pyramids provides surveys of living standards of Indian households","descriptions":{"en":"Consumer
        Pyramids provides surveys of living standards of Indian households"},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:ECONFINDATA(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"Consumer
        Pyramids dx delivers record-level data of a large household survey conducted
        in India.  A panel of households from all regions of the country  is surveyed
        on a regular basis to build longitudinal data series capturing data on: household
        demographics, employment, income and expenses, consumer sentiments, household
        amenities, assets and borrowing.   Consumer Pyramids database consists of
        the following:  - Consumption Pyramids dx which delivers fast-frequency data
        on consumption expenditure of households in India  - Income Pyramids dx which
        enables the study of seasonality of household incomes, volatility of incomes,
        growth in incomes and changing composition of household incomes  - Aspirational
        India dx provides insights into households'' interest in assets. Their interest
        could translate into ownership, desire to own, or just view on purchasing
        assets. A dozen assets are covered. A house, household comforts -- refrigerators,
        air-conditioners, coolers and washing machines; TV, computer; transport systems
        -- cars and two wheelers; also gensets, tractors and cattle specially for
