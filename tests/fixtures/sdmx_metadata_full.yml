        Trade Alert, New Industrial Policy Observatory (GTA_NIPO)","names":{"en":"Global
        Trade Alert, New Industrial Policy Observatory (GTA_NIPO)"},"descriptions":{},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:WPS(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"This
        paper introduces the New Industrial Policy Observatory (NIPO) dataset and
        documents emergent patterns of policy intervention during 2023 associated
        with the return of industrial policy. The data show that the recent wave of
        new industrial policy activity is primarily driven by advanced economies,
        and that subsidies are the most employed instrument. Trade restrictions on
        imports and exports are more frequently used by emerging market and developing
        economies. Strategic competitiveness is the dominant motive governments give
        for these measures, but other objectives such as climate change, resilience
        and national security are on the rise. In exploratory regressions, we find
        that implemented measures are correlated with the past use of measures by
        other governments in the same sector, pointing to the tit-for-tat nature of
        industrial policy. Furthermore, domestic political economy factors and macroeconomic
        conditions correlate with the use of industrial policy measures. We intend
        for the NIPO to be a publicly available resource to help monitor the evolution
        and effects of industrial policies."},"id":"FULL_DESCRIPTION","attributes":[]},{"value":"Simon
