        THIS DATA SERVICE\n​Flightradar24’s Historic Flight Events Data is a professional
        data service tracking flights from 1,200+ airlines, flying to or from 4,000+
        airports around the world and highlighting specific aircraft movements (‘Events’)
        such as takeoff, cruise, descent and landing. Historical data back to November
        1, 2018, updated on a weekly basis.\n\nAccess is provided in 2 ways:\n​ 1.
        Raw data available via a SQL database managed by Big Data Support Team. You
        will need to log in to a high performance server to work with the data. To
        request access contact IMF Library Content Development Team: jlcd@librarynetwork.org\nFlightradar24
        Database Connection: http://dm-edms.imf.org/cyberdocs/viewdocument.asp?doc=6897350&lib=DMSDR1S\n\nFlightradar24
        Tables and Variables: http://dm-edms.imf.org/cyberdocs/viewdocument.asp?doc=6897339&lib=DMSDR1S\n\n2.
        Access the data through the COVID-19 High Frequency Data Hub:​ https://intlmonetaryfund.sharepoint.com/sites/STA/SitePages/STA-High-Frequency-Data-Hub---COVID19-DataHub.aspx\n\nPassenger
        Capacity\nOur estimates, which are available for all IMF member countries,
        of weekly commercial flight passenger capacity derived from FlightRadar24
        might be a useful proxy for the number of travelers to tourism dependent economies
        – in particular island economies.\nTotal capacity is estimated at varying
        levels including by airport-pairing, country, and region. Our estimates can
        be used to supplement data on the number of flights (which we also estimate)
        to account for differing aircraft sizes, and also to provide considerably
        more granular information than typically available from other sources.\nWe
        estimate commercial flight passenger capacity weekly by matching flights reported
        by FlightRadar24 to departing and arriving airports, airline operator, aircraft
        type, and seating configuration. Capacity is estimated for each domestic and
        international flight and aggregated successively.\n","descriptions":{"en":"ABOUT
        THIS DATA SERVICE\n​Flightradar24’s Historic Flight Events Data is a professional
        data service tracking flights from 1,200+ airlines, flying to or from 4,000+
        airports around the world and highlighting specific aircraft movements (‘Events’)
        such as takeoff, cruise, descent and landing. Historical data back to November
        1, 2018, updated on a weekly basis.\n\nAccess is provided in 2 ways:\n​ 1.
        Raw data available via a SQL database managed by Big Data Support Team. You
        will need to log in to a high performance server to work with the data. To
        request access contact IMF Library Content Development Team: jlcd@librarynetwork.org\nFlightradar24
        Database Connection: http://dm-edms.imf.org/cyberdocs/viewdocument.asp?doc=6897350&lib=DMSDR1S\n\nFlightradar24
        Tables and Variables: http://dm-edms.imf.org/cyberdocs/viewdocument.asp?doc=6897339&lib=DMSDR1S\n\n2.
        Access the data through the COVID-19 High Frequency Data Hub:​ https://intlmonetaryfund.sharepoint.com/sites/STA/SitePages/STA-High-Frequency-Data-Hub---COVID19-DataHub.aspx\n\nPassenger
        Capacity\nOur estimates, which are available for all IMF member countries,
