        THIS DATA SERVICE\nKpler is a cargo tracking and data intelligence company
        providing real-time data of the global trade of commodities.\n\n​• Real-time​
        flows of commodities - from granular (installation) to macro-level (countries
        and regions).\n​• Freight data and metrics - ballast capacity, oil-on-water,
        port congestion and more.\n• Offshore and onshore inventories - tracked thanks
        to satellite and drone images, creating accurate, real-time information on
        the volume of crude oil stored in facilities.\n\n​Kpler’s methodology is based
        on the automatic sourcing, processing and aggregation of a large amount of
        raw data stemming from scattered and incomplete market sources, including
        port authorities, drone and satellite imagery, and ship agents.\n\n​ ​IMF
        has two levels of access: Entry and Standard\nEntry level access: Open to
        all staff, cannot download and Excel add-in is not included\nStandard level
        access: Limited to 40 users (each commodity module counts as one \"user\"),
        ability to download and access to the Excel add-in​. (Standard level access
        does NOT include API or Snowflake.)​​\nStandard level subscription includes
        12 commodities: Liquefied Natural Gas (LNG) | Coal | Iron Ore | Dirty Petroleum
        Products (DPP) | Clean Petroleum Products (CPP) | Crude Oil | Bauxite | Liquefied
