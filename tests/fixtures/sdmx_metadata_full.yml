        of Disasters (CRED)​\n"},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:ECONFINDATA(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"EM-DAT is
        a global database on natural and technological disasters, containing essential
        core data on the occurrence and effects of more than 22,000 disasters in the
        world, from 1900 to present. EM-DAT provides geographical, temporal, human
        and economic information on disasters at the country level. The database is
        compiled from various sources, including UN agencies, non-governmental organisations,
        insurance companies, research institutes and press agencies.​  Following their
        new data policy, non-commercial users now have access to the complete EM-DAT
        database.  In 1988, the Centre for Research on the Epidemiology of Disasters
        (CRED) launched the Emergency Events Database (EM-DAT). EM-DAT was created
        with the initial support of the World Health Organisation (WHO) and the Belgian
        Government.  The main objective of the database is to serve the purposes of
        humanitarian action at national and international levels. The initiative aims
        to rationalise decision making for disaster preparedness, as well as provide
        an objective base for vulnerability assessment and priority setting.  “CRED
        Crunch”, EM-DAT''s quarterly newsletter, is posted to the EM-DAT website.
        You can subscribe to this newsletter by uploading your email in the “Newsletter”
        field on the EM-DAT home page. "},"id":"FULL_DESCRIPTION","attributes":[]},{"value":"Centre
