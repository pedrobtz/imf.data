        Climate Score Global","names":{"en":"Jupiter Climate Score Global"},"description":"ABOUT
        THIS DATA SERVICE\nJupiter''s Climate Score Global quantifies physical climate
        risk around the world by bringing together global climate models ( incl. the
        5th and 6th iterations of the Coupled Model Intercomparison Project (CMIP6
        and CMIP5) models for three IPCC carbon emission scenarios), historical datasets
        and high-resolution topographical models. It offers metrics to directly measure
        flood, wind, heat, cold, wildfire, drought, hail, and extreme precipitation
        physical risk. Data available at five-year increments from 2020 through 2100,
        enabling both medium-term and long-term projections of future risk at the
        country or regional levels.\n\nJupiter Peril Metrics Results (selection_IMF_all
        table) contains the peril/hazards metrics for a specific location (100K),
        time period and climate scenario in each row. Locations were selected to maximize
        GDP coverage, with 97% of global GDP and only three IMF member countries with
        GDP coverage below 90%, and also considering IMF members with no gridded GDP.
        The dataset contains 184 metrics for each location grouped into eight major
        categories, for a historical baseline and three climate scenarios, with uncertainty
        bounds and groupings (bands). For more information, refer to the ClimateScore
        Global Data Model and ClimateScore Global Technical Methodology Overview;
        specific information on peril modeling is available on request.\nClimateScore
        Global Data Model - v2.6 - 25Mar2022\nClimateScore Global Technical Methodology
        Overview - v2.6 - 25Mar2022.pdf\nSelection_IMF_all SAMPLE\n\n\nJupiter Scoring
        Results (selection_IMF_all_ scores table) summarize the physical climate hazard
        for each location by mapping one or more peril metrics to a score. The scores
        include three scores per hazard per location plus an all-hazards score. Each
        row also has its percentile compared to its country and administrative zone
        1. For information, in the ClimateScore Global Scoring Methodology.\nClimateScore
        Global Scoring Methodology - v2.6 - 25Mar2022.pdf\nSelection_IMF_all_scores
        SAMPLE\n\n\nAccess is provided via SQL database:\n(To request access - email
        to IMF Library Content Development Team.)\n! Make sure to install ''Microsoft
        SQL Server 2012 Native Client x64'' from Software Self Service/SSS\nJupiter
        Database Table and Variable List\nConnect to Jupiter SQL using Stata, Python
