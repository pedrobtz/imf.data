        credit research and model building.  DRD provides comprehensive data on: •   Over
        500,000 individual debt securities •   50,000 distinct issuers •   Corporate
        and sovereign coverage •   Historical defaults back to 1920  DRD contains
        three integrated sets of data: all of Moody’s current and historical ratings,
