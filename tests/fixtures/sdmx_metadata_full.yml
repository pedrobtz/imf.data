        Ratings Pro - Fitch Fundamental Financials Data (formerly Fitch Connect)"},"description":"ABOUT
        THIS DATA SERVICE\nFitch Ratings Pro has two components: Fitch Research and
        Ratings and Fundamental Financials data.\n\nFundamental Financials Data is
        a comprehensive, global database containing information on 37,000 public and
        private banks and 13,900 insurance companies including 30+ years of historical
        data. Access via web, data feed, and Excel add-in.​\n​\n- Fitch Ratings Pro
        Web: Web interface intended for single and multi-bank look-up and analysis.
        Currently has a limit of 500 banks per portfolio and covers the last 10 years
        only.​\n- Data feed: Access to full historical bank financial data files covering
        30+ years. Currently delivered as large, flat files that can be opened in
        Excel, Stata, Matlab, etc.\n- Excel Add-in: Install from Software Center​\n​​​​Open
        Software Center (Start > All Programs > Microsoft System Center > Configuration
        Manager > Software Center)\nClick on Available Software\nSelect “New” Excel
        Addins - Fitch Connect and click \"install\"\nRestart of your computer is
