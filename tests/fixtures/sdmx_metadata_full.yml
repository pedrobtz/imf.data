        CTF Emissions Data (formerly Urgentem)","names":{"en":"ICE CTF Emissions Data
        (formerly Urgentem)"},"description":"ABOUT THIS DATA SERVICE\nICE Climate
        Transition Finance (​CTF) Emissions datasets by ICE Data services1 include:\n\nThe
        2021 Emissions Dataset contains data for about 28,300 companies, covering:\n​Scope
        1 gross (direct) emissions per tons of CO2 equivalent (tCO2e) and tCO2e/$m
        revenue; \n\n​Scope 2 emissions (indirect emissions from the generation of
        purchased energy) location-based tCO2e and tCO2e/$m revenue; Scope 2 emissions
        market-based tCO​​2e and tCO2e/$m revenue – showing the energy mix the company
        purchases (fossil fuels vs renewables);\n\n​Scope 3 (indirect upstream and
        downstream value chain) emissions, broken down individually by the 15 upstream
        and downstream Scope 3 disclosure categories tCO2e and tCO2e/$m revenue​​.\n​Each
        company is classified into 1 of 4 Disclosure Categories: (i) public, complete,
        third party-assured; (ii) public, complete, not third-party assured; (iii)
        incomplete; or (iv) no public data. Data are considered complete when 95%
        or more of a company’s worldwide emissions are covered. Note that the dataset
        includes companies with both disclosed and modelled emissions, with a total
        of about 3,300 companies (12 percent) having disclosed emissions as of 2021.\n\nThe
        ICE Climate Stress Testing Data includes scenario-aligned pathways of emissions
        for the 28,300 companies included in the 2021 ICE Emissions Dataset. The methodology
        utilizes both disclosed and modelled corporate emissions data, emissions reduction
        targets, where disclosed by companies, and incorporates the six NGFS Phase
        3 scenarios (Net Zero 2050, Divergent Net Zero, Delayed Transition, Below
        2⁰C, NDCs, and Current Policies) as well as an additional set of expected
        trajectories based on company policies.\n\nThe 2021 ICE Emission Reduction
        Targets Dataset covers about 3,100 companies and 13,000 targets and includes,
        where applicable: Target type (absolute or intensity-based); Emission scopes;
        Coverage per Scope; Reduction ambition; Base year; Start year; End year; and
        Base year emissions.\n ____________________                 \n1 Urgentem was
        acquired by Intercontinental Exchange (ICE) in 2022 and the name of the dataset
