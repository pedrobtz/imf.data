        Australia, Russia, Mexico and Saudi Arabia.\n\nThe package provides nominal
        and real data on major time series such as outstanding consumer credit, loans
        for house purchase, other loans to households, loans to non-financial corporations
        and national accounts. It also provides the breakdowns of the various credit
        statistics by maturity and currency.\n\nEach yearly issue contains all previously
        published data from earlier releases. Produced by the European Credit Research
        Institute (ECRI) at the Centre for European Policy Studies (CEPS).","descriptions":{"en":"ABOUT
