        THIS DATA SERVICE\nLinkedIn seeks to connect the world’s professionals to
        make them more productive and successful. Its network has more than 756 million
        users, 57 million+ companies, 15 million+ active job listings, and 38k standardized
        skills across more than 200 countries and territories worldwide.​\n\nLinkedIn
        data can be accessed through the Development Data Partnership, a collaboration
        between international organizations and technology companies, facilitating
        the efficient and responsible use of third-party data in international development.
        Acc​ess is assigned based on business needs. Each user is expected to submit
        a request to the data partnership team at datapartnership@imf.org.​​\n\nThese
        datasets are available for proposals:\n\n​​LinkedIn Growth of Green Skills:
        ​This dataset can be used to understand how fast green skills are growing.
        The dataset sample is provided at a global level but this dataset can be provided
        at other levels of aggregation, for example at industry level or country level.\n\nGreen
        LinkedIn Skills Penetration: Skill penetration benchmarks skills clusters
        in industries across countries over time. This dataset can be used to understand
        how penetrated (intense) green skills are in a particular country-industry
        pair. By comparing to global averages, it can be used to benchmark how ‘green’
        a country-industry pair is. By providing yearly data, the dataset can be used
        to assess whether or not a country-industry pair is becoming relatively ‘greener’
        over time.\n\nGreen LinkedIn Hiring Rate: ​The LinkedIn Hiring Rate (LHR)
        is the percentage of LinkedIn members who added a new employer to their profile
        in the same month the new job began, divided by the total number of LinkedIn
        members in that country.\n\nLinkedIn Skills Genome​: - Provides the most representative
        skills of an entity (e.g. occupation or region)\n- Practical uses include
        identifying the skills needed to provide complete training for a given occupation\n-
        Alternate use includes bench marketing a region’s unique skills for economic
        development​\n\n​​LinkedIn Career Transitions​: ​Shows the aggregate level
        of member career transitions between occupational pairs.​​\n\n​Skills Similarity:
        ​Measures the level of skill alignment between two occupations or industry
        group pairs.\n\n​Top Skills: ​Measures the most prevalent skills in a particular
        segment, such as a particular geography, sector, and/or occupation.\n\n​​Hiring
        Rate:​ The LinkedIn Hiring Rate (LHR) is the percentage of LinkedIn members
        who added a new employer to their profile in the same month the new job began,
        divided by the total number of LinkedIn members in that country. Measures
        the rate of new hires/starts for the entire economy or subsection\n\n​Skills
        Penetration: ​​Benchmarks skills clusters in occupations across countries
        over time.","descriptions":{"en":"ABOUT THIS DATA SERVICE\nLinkedIn seeks
        to connect the world’s professionals to make them more productive and successful.
        Its network has more than 756 million users, 57 million+ companies, 15 million+
        active job listings, and 38k standardized skills across more than 200 countries
        and territories worldwide.​\n\nLinkedIn data can be accessed through the Development
        Data Partnership, a collaboration between international organizations and
        technology companies, facilitating the efficient and responsible use of third-party
        data in international development. Acc​ess is assigned based on business needs.
        Each user is expected to submit a request to the data partnership team at
        datapartnership@imf.org.​​\n\nThese datasets are available for proposals:\n\n​​LinkedIn
        Growth of Green Skills: ​This dataset can be used to understand how fast green
        skills are growing. The dataset sample is provided at a global level but this
        dataset can be provided at other levels of aggregation, for example at industry
        level or country level.\n\nGreen LinkedIn Skills Penetration: Skill penetration
        benchmarks skills clusters in industries across countries over time. This
        dataset can be used to understand how penetrated (intense) green skills are
        in a particular country-industry pair. By comparing to global averages, it
        can be used to benchmark how ‘green’ a country-industry pair is. By providing
        yearly data, the dataset can be used to assess whether or not a country-industry
        pair is becoming relatively ‘greener’ over time.\n\nGreen LinkedIn Hiring
        Rate: ​The LinkedIn Hiring Rate (LHR) is the percentage of LinkedIn members
        who added a new employer to their profile in the same month the new job began,
        divided by the total number of LinkedIn members in that country.\n\nLinkedIn
        Skills Genome​: - Provides the most representative skills of an entity (e.g.
        occupation or region)\n- Practical uses include identifying the skills needed
        to provide complete training for a given occupation\n- Alternate use includes
        bench marketing a region’s unique skills for economic development​\n\n​​LinkedIn
        Career Transitions​: ​Shows the aggregate level of member career transitions
        between occupational pairs.​​\n\n​Skills Similarity: ​Measures the level of
        skill alignment between two occupations or industry group pairs.\n\n​Top Skills:
        ​Measures the most prevalent skills in a particular segment, such as a particular
        geography, sector, and/or occupation.\n\n​​Hiring Rate:​ The LinkedIn Hiring
        Rate (LHR) is the percentage of LinkedIn members who added a new employer
        to their profile in the same month the new job began, divided by the total
        number of LinkedIn members in that country. Measures the rate of new hires/starts
        for the entire economy or subsection\n\n​Skills Penetration: ​​Benchmarks
        skills clusters in occupations across countries over time."},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:ECONFINDATA(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"LinkedIn
