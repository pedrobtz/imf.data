        and all of Latin America (LATAM).  The web site includes full coverage of
        rumoured and expected deals in the international bond markets, broken down
        on a regional and market sector basis. The Data Wizard enables specific searches
        to be detailed for user defined charts, league tables and spreadsheets. Announcements
