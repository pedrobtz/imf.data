        THIS DATA SERVICE\nOokla is the global leader in mobile and broadband network
        intelligence, testing applications and technology. With over 10 million consumer-initiated
        tests taken daily on the company’s platform, Speedtest, Ookla provides invaluable
        insight into the performance, quality and accessibility of networks worldwide.\n\nOokla
        data can be accessed through the Development Data Partnership, a collaboration
        between international organizations and technology companies, facilitating
        the efficient and responsible use of third-party data in international development.
        Access is assigned based on business needs. Each user is expected to submit
        a request to the Data Partnership Team at datapartnership@imf.org.\n\nThese
        datasets are available for proposals:\n\nSpeedtest Intelligence: Drawn from
        billions of measurements from consumer devices, Speedtest Intelligence® provides
        comprehensive insights on virtually every fixed and mobile network worldwide.\n\nFind
        detailed KPIs and global insights on:\n• Fixed and mobile network performance\n•
        Coverage and availability\n• Video experience\n• Mobile gaming experience\n•
        Consumer sentiment\n\nWhat’s available –\nThe Portal includes over 200 data
        elements that give you information to:\n• Assess provider performance and
        undertake competitive benchmarking\n• Determine best locations for potential
        network investment and expansion\n• Understand which devices perform best
        on each network\n• Gain insights into customer perceptions of networks\n•
        Understand customer video and mobile gaming experience\n• Track changes in
        network performance\n• Analyze network footprint\n• Pinpoint geographic hotspots
        of network issues\n• View how metrics vary by location\n• Failed/Partial Tests:
        Identify whether network failure or consumer interruption caused an incomplete
        Speedtest\n\nWhat can be compared –\nThe Speedtest Intelligence Portal presents
        aggregated and analyzed data with filters that allow comparison by:\n• Provider\n•
        Location\n• Historical periods\n• Device or chipset\n• Product manufacturer\n•
        Mobile technology (e.g., 3G, 4G LTE, 5G)\n• Fixed broadband platform (e.g.,
