        Crossborder Investment","names":{"en":"Orbis Crossborder Investment"},"description":"ABOUT
        THIS DATA SERVICE\nOrbis Crossborder Investment provides data on cross-border
        Greenfield Foreign Direct Investment (FDI) projects and Mergers & Acquisitions
        (M&A) activities. It compiles information on the entities involved in the
        investments, including both public and private companies.\n\nThe database
        is updated daily and includes records of announced, completed, and cancelled/withdrawn
        projects and deals, as well as unconfirmed reports.\n\nCoverage: 2003* – Current
        (Original coverage from 2015 onwards is expanded back to 2003 with 16,000
        projects covered, additional 60,000 projects will be added in the next few
        months)​​\n\n​​Including:​\nGreenfield FDI projects – such as a company setting
        up (or expanding) a physical presence in a foreign market\nCrossborder M&A
        deals – defined as having more than 10% foreign ownership and including acquisitions,
        mergers, demergers, joint ventures minority stakes and IPOs\nCovering:​\nDetails
        of the investor, target and vendor companies, financial data, structures,
        and people\nProject size estimates if no data is available\nIndications of
        companies'' propensity to invest\nProject/deal comments and rationale\nProject
        financials, job creation, motives, incentives, sources of finance, comments
        rationale, contacts, business function, and links to other relevant projects/deals\n\n\nTo
        request access to the SQL server:\nSubmit a request to join appbwn44p​ group
        through MyITAccess by following the step-by-step instructions\nYou will receive
        instructions to login, access the files, and manage your folders and datasets\n​​Database
