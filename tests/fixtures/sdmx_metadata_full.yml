        extracted from news articles.\tA record of events reported in the news, including
        various attributes related to the events.\nVariables\t\nEntities (people,
        organizations, locations)\nThemes (topics of discussion)\nEmotion scores (positive,
        negative, and neutral)\nSource information (media outlets)\nDate and time
