        Economics on Datastream","names":{"en":"Oxford Economics on Datastream"},"description":"ABOUT
        THIS DATA SERVICE\nCountry Macro Data — Oxford Economics is an independent
        economic consultancy and a leading provider of economic content, forecasts,
        reports, and conferences. They are known for highly reliable and comprehensive
        forecasts derived from their proprietary model, the most widely used commercial
        international macroeconomic model in the world. Oxford Economics provides
        long-term forecasts 25 years out, history from the 1980’s. Coverage is of
        200 countries and 34 regions, totaling over 132,000 series. The series are
        at annual frequency for all countries and regions, and also quarterly for
        45 leading developed and emerging markets. Updates are posted each month.
        Indicators are presented in national and common terms for comparability across
        countries.\nCoverage includes:\nNational and government accounts\nBalance
        of payments and international trade\nPrices and wages\nFinancial indicators
        by sector and types of debt\nLabour, energy and housing market statistics\nChina
        Cities — Comprehensive forecasts for 30 provinces and 286 cities of China,
        totaling 8,816 series. These include national totals and relevant key macro
        and financial indicators detailing output and employment, population, household
        income, and consumer spending. The series are annual with varying histories,
        farthest back to 1980. Forecasts are out to 2035.\nHow to find Oxford Economics
        data in Datastream:\nIn Excel, go to Refinitiv Eikon​ tab and Sign In\nGo
        to Refinitiv Eikon Datastream tab, click on Time Series Request\nClick Find
        Series button\nSelect category Economics\nClick More Single Filters to expand
