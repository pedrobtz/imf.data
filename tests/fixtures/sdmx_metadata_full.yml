        Default and Recovery Database","names":{"en":"Moody’s Default and Recovery
        Database"},"description":"ABOUT THIS DATA SERVICE\nMoody’s Default & Recovery
        Database (DRD) provides comprehensive data on defaults, recovery from default,
        and rating changes (at both the security and issuer level) for all corporate
        issuers of long-term bonds. DRD is a great tool for credit research and model
        building.\n\nDRD provides comprehensive data on:\n•   Over 500,000 individual
        debt securities\n•   50,000 distinct issuers\n•   Corporate and sovereign
        coverage\n•   Historical defaults back to 1920\n\nDRD contains three integrated
        sets of data: all of Moody’s current and historical ratings, the data used
        by Moody’s analysts to conduct Moody’s annual default studies, and the data
        used by Moody’s analysts to create and refine Moody’s loss given default rating
        methodology.\n\nUsers also have access to the Credit Risk Calculator (CRC)
        via moodys.com (​https://www.moodys.com/credit-model/report/default, which
        provides the same coverage as DRD. Moody’s Credit Risk Calculator is an easy
        to use, web-based tool designed to allow you to quickly calculate customized
        rating transition matrices and default rates. The platform is graphically
        pleasing and interactive.","descriptions":{"en":"ABOUT THIS DATA SERVICE\nMoody’s
        Default & Recovery Database (DRD) provides comprehensive data on defaults,
        recovery from default, and rating changes (at both the security and issuer
        level) for all corporate issuers of long-term bonds. DRD is a great tool for
        credit research and model building.\n\nDRD provides comprehensive data on:\n•   Over
        500,000 individual debt securities\n•   50,000 distinct issuers\n•   Corporate
        and sovereign coverage\n•   Historical defaults back to 1920\n\nDRD contains
        three integrated sets of data: all of Moody’s current and historical ratings,
        the data used by Moody’s analysts to conduct Moody’s annual default studies,
        and the data used by Moody’s analysts to create and refine Moody’s loss given
        default rating methodology.\n\nUsers also have access to the Credit Risk Calculator
        (CRC) via moodys.com (​https://www.moodys.com/credit-model/report/default,
        which provides the same coverage as DRD. Moody’s Credit Risk Calculator is
        an easy to use, web-based tool designed to allow you to quickly calculate
        customized rating transition matrices and default rates. The platform is graphically
        pleasing and interactive."},"version":"1.0.0","agencyID":"IMF","action":"Replace","metadataflow":"urn:sdmx:org.sdmx.infomodel.metadatastructure.Metadataflow=IMF:ECONFINDATA(1.0.0)","attributes":[{"value":"","id":"DOI","attributes":[]},{"value":{"en":"Moody’s
