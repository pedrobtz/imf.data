        Capital IQ - Compustat","names":{"en":"S&P Capital IQ - Compustat"},"description":"ABOUT
        THIS DATA SERVICE\nS&P ​Compustat is a comprehensive database of fundamental
        financial, statistical and market information on both active and inactive
        global companies, indices, and industries throughout the world. The service
        began in 1962.\nThe database covers 99,000 global securities, covering 99%
        of the world''s total market capitalization with annual company data history
        available back to 1950 and quarterly data available back to 1962 (depending
        when that company was added to the database).\n\nCurrent Capital IQ subscribers
        do not need to register again to access Compustat\n\nTHERE ARE TWO ACCESS
        MODES FOR COMPUSTAT\n\n1. DATA FEED DATABASE:\nALL COMPUSTAT CONTENT AVAILABLE
        TO ALL IMF STAFF.\nUsers need to be added to the IMF-Compustat_Data_Group
        to get access to Compustat Data. To request access - email to jlcd@librarynetwork.org.\n\nInstructions
