        ​​​​"},"id":"LICENSE","attributes":[]},{"value":{},"id":"SUGGESTED_CITATION","attributes":[]},{"value":{},"id":"USAGE_RIGHTS_NOTES","attributes":[]},{"value":{},"id":"ACCESS_INSTRUCTIONS","attributes":[]},{"value":"","id":"TEMPORAL_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]},{"value":"","id":"FREQUENCY_COVERAGE","attributes":[]}],"targets":[]},{"annotations":[{"id":"origin","value":"INTEGRATION"},{"id":"isFinal"},{"id":"lastUpdatedAt","value":"2025-12-18T19:20:14.478323Z"}],"id":"META","name":"Meta","names":{"en":"Meta"},"description":"ABOUT
        THIS DATA SERVICE\nMeta, an online social networking platform, seeks to give
        people the power to build community and bring the world closer together. Facebook
        receives 2.1 billion users per month (as of 12/2017). Facebook-owned subsidiaries
        include: WhatsApp, Messenger, Instagram, Oculus, and Mapillary.Meta, an online
        social networking platform, seeks to give people the power to build community
        and bring the world closer together. Facebook receives 2.1 billion users per
        month (as of 12/2017). Facebook-owned subsidiaries include: WhatsApp, Messenger,
        Instagram, Oculus, and Mapillary.\n\nMeta data can be accessed through the
        Development Data Partnership, a collaboration between international organizations
        and technology companies, facilitating the efficient and responsible use of
        third-party data in international development. Access is assigned based on
        business needs. Each user is expected to submit a request to the Data Partnership
        Team at datapartnership@imf.org.\n\nThese datasets are available for proposals:\n\nClimate
        Conversation Maps: These maps show aggregate metrics for how often people
        in a region consume and engage with public posts on Facebook that are believed
        to be related to climate change.\n\nDisaster Maps: Facebook Disaster Maps
        includes the following disaster-related datasets: (a) Geospatial density of
        the Facebook population; (b) Metrics related to population movement; (c) Metrics
        on power availability and whether the number of cellular phones being charged
        has declined; (d) Metrics indicating the number of cellular towers being accessed
        in a given area as a proxy for cellular service coverage; (e) Metrics on long-term
        displacement in the aftermath of a natural disaster. Data are available for
        places where disasters have recently occurred. Facebook is offering teams
        who submit proposals access to their platform, though which team members can
        view and download these data. Facebook is interested in learning how their
        data can support development and humanitarian project outcomes.\n\nDisease
        Prevention Maps: Facebook Disease Prevention Maps include three datasets:
        Population Maps, Movement Maps, and Network Coverage Maps. Population Maps
        are high resolution population density maps that estimate the number of people
        living within 30-meter grid tiles and demographic data, such as the number
        of children under five, number of women of reproductive age, etc. These maps
        are not generated with Facebook data -- rather, they rely on modeling of satellite
        imagery and census information, which ensures privacy protection and a more
        accurate view of the world in places where use of Facebook and other Internet-enabled
        services are low. Movement Maps are useful when infectious diseases strike,
        whether vector-borne diseases like malaria or diseases spread through human
        contact like influenza, by aggregating information from people using Facebook
        on their mobile phones with location history turned on. With these data, Facebook
        can insights into how population movement affects the likelihood of future
        outbreaks (note that the insights included in movement data are representative
        of persons who use the Facebook app and have Location History turned on).
        Network Coverage Maps. For the last ten years, the global health community
        has worked to increase the spread of mobile health technologies, which dramatically
        reduce the cost of healthcare services through use of digital tools. However,
        many countries still suffer from gaps in access to the Internet, and public
        health officials have limited information on locations where vulnerable groups
        can be reached digitally. Because so many Facebook users rely on cellular
        networks to access social media, Facebook can create real-time maps on the
        availability of 2g, 3g and 4g networks, such that health organizations sending
        messages in advance of vaccination days or bednet distributions have an up-to-date
        view of who can be reached with an online message. Facebook is offering teams
        who submit proposals to view and download these data as .csv and .geotiff
        files through a custom web-based portal.\n\nElectrical Distribution Grid Maps:
        Facebook Electricity Distribution Grid data is useful for organizations that
        work in the field of infrastructure and sustainable development, across many
        sectors. Local governments can use the data to track and understand the current
        energy and electrification needs for community development investments. Businesses,
        such as utility companies and internet service providers that heavily rely
        on electrical infrastructure, can use these grid maps to optimize their investments
        based on electricity access gaps. Non-profit organizationscan use the data
        to better understand beneficiary connectivity, education, and water needs.
        Facebook developed a predictive model for mapping medium-voltage (MV) infrastructure
        using a new methodology that employs various publicly-available datasets such
        as roads, night time satellite imagery, political boundaries, etc. The outputs
        of this model are available through the World Bank’s open energy data repository
        for six select African countries: Malawi, Nigeria, Uganda, DRC, Cote D’Ivoire,
        and Zambia. Electrical Grid Maps are built by creating a composite using monthly
        images from the VIIRS satellite. A custom image processing filter is then
        used to remove background and reflected light and identify night lighting.
        These images serve as a proxy for the presence of grid electricity. An algorithm
        is employed to connect the communities and infer grid paths using electrical
        grids as templates, based on data available from energydata.info. More technical
        information about this can be found here: https://code.fb.com/connectivity/electrical-gridmapping/.
        Public data sources from which data are drawn include: satellite imagery from
        the Visible Infrared Imaging Radiometer Suite (VIIRS) product, a NASA satellite
        imagery dataset that shows the earth at night; MODIS land cover dataset, a
        global product providing land cover classifications for any location in the
        world; roadway locations from OpenStreetMap. Teams can find already prepared
        electrical grid maps here: https://electrifynow.energydata.info For countries
        not already covered, staff can submit proposals, requesting Facebook to prepare
        maps for requested areas.\n\nFuture of Business Survey: The Future of Business
        survey is a collaboration between Facebook, the OECD and the World Bank to
        provide timely insights on the perceptions, challenges, and outlook of online
        Small and Medium Enterprises (SMEs). The survey includes questions about perceptions
        of current and future economic activity, challenges, business characteristics
        and strategy. Custom modules include questions related to regulation, access
        to finance, digital payments, and digital skills. The data being made available
        to teams are the original, unprocessed survey results. Further information
        may be found here: https://eu.futureofbusinesssurvey.org. The data are updated
        bi-annually, for the duration of the Survey (end-date tbd). Although the raw
        data may not be shared externally, analyses derived from the data may be shared
        and published, with attribution.\n\nHospital Locations: The Facebook Hospital
        Locations dataset includes machine-learning identified candidates for hospital
        locations. Facebook provides teams with a map of number of candidates per
        admin level 2. Facebook runs public Instagram and Facebook user uploaded images
        by their vision ML and then they identify those that are likely taken in or
        around a hospital (by the look of the building outdoors, by the presence in
        the room of stethoscopes, people in gowns, etc). Those pictures with a “hospital”
        score beyond a threshold are tagged, and then the photo location is dumped
        into a map. To further protect privacy, Facebook only considers a location
        a candidate when they find more than a set number of candidates within a small
        region. These locations of clusters of candidates create this dataset.In a
        project in cooperation with HOT OSM in Indonesia they found it to be +80%
        accurate (considering false positives). The data for location candidates is
        available worldwide, but the quality is dependent of Facebook and Instagram
        usage, and cultural differences to take pictures in those locations.\n\nPopulation
        Density Maps: The Facebook High Resolution Settlement Layer (HRSL) geospatial
        data offers high resolution population dataset collected from satellite imagery.
        The layer provides estimates of human population distribution at a resolution
        of 1 arc-second (approximately 30 meters). Facebook provides access to population
        datasets that can be used for a variety of purposes such as humanitarian aid
        planning, disaster response, vaccination planning, communications infrastructure
        development, and infrastructure planning. The Connectivity Lab at Facebook
        developed population settlement data using computer vision techniques. These
        techniques categorize chunks of optical satellite data containing buildings
        (or not). This in turn helps population grids provide detailed description
        of settlements in both urban and rural areas. Facebook uses a combination
        of three image-processing steps for the computer vision analysis. First, an
        image-processing procedure is used to select areas that possibly contain human-made
        structures, removing images with stretches of land and water. Following this,
        Facebook’s image-recognition engine based on a deep convolutional neural network
        detects whether a satellite image contains a building. By using a binary labeling
        scheme of whether the image does or does not contain a building, the neural
        network learns “what” and “where” simultaneously. The outlines of buildings
        are identified and highlighted while concealing regions not likely to include
        human-made structures. Project teams can access these high-resolution population
        maps through the Center for International Earth Science Information Network
        (CIESIN) at Columbia University. The datasets can be downloaded directly from
        the CIESIN website. For countries not available through the website, staff
        may submit proposals and request these from Facebook directly.\n\nSocial Connectedness
        Index: Measures the strength of connections between national or subnational
        regions as measured by Facebook friendship ties. These connections can reveal
        important insights about economic opportunities, social mobility, trade and
        more.\n\nSurvey on Gender Equality at Home: Facebook’s Survey on Gender Equality
        at Home Report, based on the Survey on Gender Equality at Home, is an ongoing
        research collaboration by Facebook, the World Bank, UN Women, Equal Measures
        2030, and Ladysmith. The survey was conducted in July 2020 to capture household
        gender dynamics during the COVID-19 pandemic, and it reached over 460,000
        people in over 200 countries.\n\nRelative Wealth Index: The Relative Wealth
        Index predicts the relative standard of living within countries using de-identified
        connectivity data, satellite imagery and other nontraditional data sources.\n\nOther:
        Facebook one-off requests. Please do not select this option unless instructed
