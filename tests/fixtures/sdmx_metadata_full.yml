        Connect","names":{"en":"FSI Connect"},"description":"ABOUT THIS DATA SERVICE\nFSI
        Connect is an e-learning tool provided by the Financial Stability Institute
        (FSI) at the Bank for International Settlements (BIS). The purpose of FSI
        Connect is to provide training opportunities in a variety of topics of relevance
        to financial sector supervisors around the world. It is available via the
        internet and offers in excess of 250 tutorials. The topics covered include
        supervisory guidance, tools and techniques; capital adequacy and solvency,
        including Basel I, Basel II and Solvency II; key risks, such as credit, liquidity,
        market, operational and insurance risks, and their management; various accounting
        issues; and other areas of supervisory concern, such as stress testing and
        dealing with problem institutions. Several tutorials are also available on
        deposit insurance and payment systems. The tutorials range from 30 minutes
        to three hours in length and cover fundamental, intermediate and advanced
