        World Telecommunication/ICT Indicators (WTI) Database"},"description":"ABOUT
        THIS DATA SERVICE\nThe World Telecommunication / ICT Indicators database contains
        time series data for the years 1960, 1965, 1970 and bi-annually from 1975-2023
        for around 180 telecommunication / ICT statistics and for over 200 economies
        worldwide.\n\nThe ICT indicators included in the database cover fixed-telephone,
        mobile-cellular, fixed-broadband and mobile-broadband services, as well as
        statistics concerning international connectivity, quality of service, traffic,
        persons employed, ICT prices, revenue, investment and data on ICT access and
        use by households and individuals. Selected demographic and macro-economic
        statistics are also included in the database. More detailed data on ICT access
        and use by households and individuals are available in pre-defined tables.
        Notes including metadata are also included.\n\nThe data are collected from
        the annual statistical questionnaires sent out by the Telecommunication Development
        Bureau (BDT) of ITU to telecommunication ministries, regulators and national
        statistical offices.​","descriptions":{"en":"ABOUT THIS DATA SERVICE\nThe
