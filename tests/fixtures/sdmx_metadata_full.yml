        on Datastream","names":{"en":"Worldscope on Datastream"},"description":"ABOUT
        THIS DATA SERVICE\nDatastream includes the Worldscope dataset of financial
        information for public companies worldwide. This source includes financial
        statements and ratios from over 81,000 companies with over 99% of the global
        market capitalization. Worldscope offers comprehensive annual history from
        the late 1980s for firms in developed markets, and from the early 1990s for
        firms in emerging markets. Some annual records date back to 1980. Worldscope
        also provides interim history from 1998 for U.S. companies and from 2001 for
        non-U.S. companies.\n\nOver 120 countries are represented, and include all
        countries in targeted global indices (FTSE All World, Dow Jones Global, MSCI
        World, MSCI EMF, S&P Global, S&P/Citigroup).​​​\n\n​Worldscope Templates\nExisting
        templates are not maintained, requests for new templates require additional
        fees​. Contact IMF Library for more information. \nWorldscope_US.xlsm\nUK_BalanceSheet_2010.xlsm\nBalance
