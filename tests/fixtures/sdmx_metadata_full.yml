        coordinates)\nParticipants (who is involved)\nDate and time of occurrence\nContextual
        information (background details)\nBoth of the databases could be useful for
        different teams within the IMF. For example, if we were interested in an Energy
        Subsidy Reform analysis:\n\nIn the GKG database, every article is tagged with
        different themes (topics of discussion). Out of the 60k themes, using python
        scripts and machine learning techniques, 77 themes were tagged as “relevant”
        for the ESR analysis. If we would select the topic “WB 1627 ENERGY SUBSIDIES”
        for the entirety of the database in English at the IMF (from January 20​15
        to October 2024), then we get more than 6M articles. Even if we can’t get
        the full text of the articles (as per compliance reasons) and, hence, do our
        own sentiment analysis, we could use these 6M articles to: identify stakeholders
        (people, organizations, entities) that are more mentioned in the context of
